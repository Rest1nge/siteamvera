<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>BeatWave — Музыкальная платформа</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --tg-bg: var(--tg-theme-bg-color, #0a0a0f);
            --tg-text: var(--tg-theme-text-color, #ffffff);
            --tg-hint: var(--tg-theme-hint-color, #8e8e9a);
            --tg-button: var(--tg-theme-button-color, #7c3aed);
            --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #1c1c24);
            --card-bg: rgba(28, 28, 36, 0.8);
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.3);
            --glow: 0 0 20px rgba(124, 58, 237, 0.3);
            --success: #10b981;
        }
        body { background: var(--tg-bg); color: var(--tg-text); font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 20% 50%, rgba(124,58,237,0.08) 0%, transparent 50%); pointer-events: none; z-index: 0; }
        .app-container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 20px 24px 100px 24px; }
        .nav-tabs { display: flex; gap: 8px; background: rgba(28,28,36,0.6); backdrop-filter: blur(10px); padding: 8px; border-radius: 60px; margin-bottom: 32px; border: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; }
        .nav-tab { flex: 1; padding: 12px 20px; border: none; background: transparent; color: var(--tg-hint); font-weight: 600; font-size: 0.9rem; border-radius: 40px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .nav-tab i { font-size: 1.1rem; }
        .nav-tab.active { background: var(--gradient-1); color: white; box-shadow: var(--glow); }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .market-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .cart-btn { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 40px; display: flex; align-items: center; gap: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s; color: var(--tg-text); }
        .cart-count { background: #f5576c; color: white; border-radius: 30px; padding: 2px 8px; font-size: 0.75rem; }
        .main-sections { display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }
        .main-tab { padding: 8px 20px; border-radius: 40px; cursor: pointer; transition: all 0.3s; background: transparent; color: var(--tg-hint); font-weight: 600; }
        .main-tab.active { background: var(--gradient-1); color: white; }
        .search-bar { margin-bottom: 24px; position: relative; }
        .search-input { width: 100%; padding: 14px 20px 14px 48px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 60px; color: var(--tg-text); font-size: 1rem; backdrop-filter: blur(10px); transition: all 0.3s; }
        .search-input:focus { outline: none; border-color: #7c3aed; box-shadow: var(--glow); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--tg-hint); }
        .popular-section { margin-bottom: 32px; }
        .popular-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--tg-hint); }
        .popular-grid { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: thin; }
        .popular-beat-card, .popular-producer-card { background: var(--card-bg); border-radius: 20px; padding: 12px 20px; min-width: 180px; display: flex; align-items: center; gap: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: all 0.3s; }
        .popular-beat-card:hover, .popular-producer-card:hover { transform: translateY(-2px); border-color: rgba(124,58,237,0.3); }
        .popular-beat-cover { width: 50px; height: 50px; border-radius: 12px; background: var(--gradient-1); background-size: cover; }
        .popular-beat-info h4 { font-size: 0.9rem; font-weight: 700; }
        .popular-beat-info p { font-size: 0.7rem; color: var(--tg-hint); }
        .popular-producer-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gradient-2); display: flex; align-items: center; justify-content: center; }
        .beats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px; }
        .beat-card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .beat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: rgba(124,58,237,0.3); }
        .beat-cover { height: 200px; background-size: cover; background-position: center; position: relative; display: flex; align-items: center; justify-content: center; }
        .beat-cover.default { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .play-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; cursor: pointer; }
        .beat-card:hover .play-overlay { opacity: 1; }
        .play-btn { width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #7c3aed; font-size: 1.5rem; cursor: pointer; transition: transform 0.2s; }
        .beat-info { padding: 20px; }
        .beat-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
        .beat-producer { font-size: 0.8rem; color: var(--tg-hint); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .beat-tags { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .tag { background: rgba(124,58,237,0.2); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; }
        .action-buttons { display: flex; gap: 12px; margin-top: 12px; }
        .price { font-size: 1.5rem; font-weight: 800; background: var(--gradient-2); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .add-to-cart, .favorite-btn, .buy-btn { border: none; padding: 10px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .add-to-cart, .buy-btn { background: var(--gradient-1); color: white; }
        .favorite-btn { background: rgba(255,255,255,0.1); color: var(--tg-text); }
        .favorite-btn.active { background: #f5576c; color: white; }
        .profile-header { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 32px; padding: 32px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .profile-avatar-large { width: 120px; height: 120px; border-radius: 50%; background: var(--gradient-1); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 3rem; overflow: hidden; cursor: pointer; }
        .profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        .profile-username { text-align: center; font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; }
        .profile-stats { display: flex; justify-content: center; gap: 32px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-item { text-align: center; }
        .stat-number { font-size: 1.5rem; font-weight: 800; background: var(--gradient-2); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .stat-label { font-size: 0.8rem; color: var(--tg-hint); }
        .edit-profile-btn { display: block; width: fit-content; margin: 0 auto 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 10px 28px; border-radius: 40px; color: var(--tg-text); font-weight: 600; cursor: pointer; }
        .profile-bio { text-align: center; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 20px; color: var(--tg-hint); line-height: 1.6; }
        .profile-sections { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
        .section-tab { flex: 1; padding: 14px 20px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 60px; cursor: pointer; text-align: center; font-weight: 700; color: var(--tg-hint); transition: all 0.3s; }
        .section-tab.active { background: var(--gradient-1); color: white; box-shadow: var(--glow); }
        .section-tab span { font-size: 0.85rem; margin-left: 8px; }
        .items-list { display: flex; flex-direction: column; gap: 16px; }
        .item-row { background: var(--card-bg); border-radius: 20px; padding: 16px; display: flex; align-items: center; gap: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .item-cover-small { width: 60px; height: 60px; border-radius: 16px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--gradient-1); }
        .item-cover-small img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
        .item-info { flex: 1; }
        .item-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
        .item-price { font-size: 0.9rem; font-weight: 600; color: #a78bfa; }
        .item-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
        .item-actions { display: flex; gap: 8px; }
        .item-actions button { background: rgba(255,255,255,0.1); border: none; width: 36px; height: 36px; border-radius: 50%; color: var(--tg-text); cursor: pointer; transition: all 0.2s; }
        .upload-form { background: var(--card-bg); border-radius: 32px; padding: 32px; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: var(--tg-text); font-size: 1rem; }
        .form-group select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 20px; }
        .form-group textarea { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: var(--tg-text); font-size: 1rem; resize: vertical; min-height: 80px; }
        .upload-area { border: 2px dashed rgba(255,255,255,0.2); border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: #7c3aed; background: rgba(124,58,237,0.05); }
        .upload-status { font-size: 0.85rem; margin-top: 8px; }
        .upload-status.success { color: var(--success); }
        .submit-beat-btn { width: 100%; background: var(--gradient-1); border: none; padding: 14px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; margin-top: 10px; transition: transform 0.2s; }
        .button-group { display: flex; gap: 12px; margin-top: 20px; }
        .cancel-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 14px; border-radius: 40px; color: var(--tg-text); font-weight: 600; cursor: pointer; flex: 1; }
        .delete-btn { background: rgba(245,87,108,0.2); border: 1px solid #f5576c; color: #f5576c; }
        .registration-card { background: var(--card-bg); border-radius: 32px; padding: 32px; border: 1px solid rgba(255,255,255,0.1); }
        .signature-area { border: 2px dashed rgba(255,255,255,0.2); border-radius: 20px; padding: 16px; margin-top: 8px; }
        .signature-canvas-container { background: white; border-radius: 12px; margin-bottom: 12px; }
        canvas.signature-canvas { display: block; width: 100%; height: 150px; background: white; border-radius: 12px; cursor: crosshair; touch-action: none; }
        .signature-buttons { display: flex; gap: 12px; justify-content: center; }
        .signature-buttons button { background: rgba(255,255,255,0.1); border: none; padding: 8px 16px; border-radius: 30px; color: var(--tg-text); cursor: pointer; }
        .register-submit-btn { width: 100%; background: var(--gradient-1); border: none; padding: 16px; border-radius: 60px; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 20px; }
        .audio-player { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); padding: 12px 24px; z-index: 100; transform: translateY(100%); transition: transform 0.3s; }
        .audio-player.active { transform: translateY(0); }
        .player-content { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .player-info { flex: 1; min-width: 150px; }
        .player-controls { display: flex; gap: 16px; }
        .player-controls button { background: none; border: none; color: var(--tg-text); font-size: 1.2rem; cursor: pointer; }
        .progress-bar { flex: 2; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; cursor: pointer; }
        .progress-fill { height: 100%; background: var(--gradient-1); border-radius: 2px; width: 0%; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 1000; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: all 0.3s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-content { background: var(--card-bg); border-radius: 32px; padding: 32px; max-width: 550px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); padding: 12px 24px; border-radius: 60px; z-index: 1100; transition: all 0.3s; white-space: nowrap; font-weight: 500; }
        @media (max-width: 768px) { .app-container { padding: 16px; } .nav-tab span { display: none; } .nav-tab i { font-size: 1.3rem; } .toast { white-space: normal; max-width: 90%; text-align: center; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="nav-tabs">
        <button class="nav-tab active" data-page="home"><i class="fas fa-home"></i><span> Главная</span></button>
        <button class="nav-tab" data-page="upload"><i class="fas fa-upload"></i><span> Загрузка</span></button>
        <button class="nav-tab" data-page="favorites"><i class="fas fa-heart"></i><span> Избранное</span></button>
        <button class="nav-tab" data-page="profile"><i class="fas fa-user"></i><span> Профиль</span></button>
    </div>

    <div id="homePage" class="page active">
        <div class="market-header"><h2><i class="fas fa-store"></i> Маркетплейс</h2><button class="cart-btn" id="cartBtn"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></button></div>
        <div class="popular-section"><div class="popular-title"><i class="fas fa-chart-line"></i> Популярное за последнее время</div><div class="popular-grid" id="popularBeatsGrid"></div></div>
        <div class="popular-section"><div class="popular-title"><i class="fas fa-crown"></i> Популярные битмейкеры</div><div class="popular-grid" id="popularProducersGrid"></div></div>
        <div class="main-sections">
            <div class="main-tab active" data-main="beats">🎵 Биты</div>
            <div class="main-tab" data-main="kits">📦 Киты</div>
            <div class="main-tab" data-main="services">💼 Услуги</div>
        </div>
        <div class="search-bar"><i class="fas fa-search search-icon"></i><input type="text" class="search-input" id="searchInput" placeholder="Поиск по названию, битмейкеру, тегам, BPM..."></div>
        <div class="beats-grid" id="beatsGrid"></div>
    </div>

    <div id="uploadPage" class="page"><div id="uploadFormContainer"></div></div>
    <div id="favoritesPage" class="page"><h2 style="margin-bottom: 24px;"><i class="fas fa-heart"></i> Избранное</h2><div class="search-bar"><i class="fas fa-search search-icon"></i><input type="text" class="search-input" id="favSearchInput" placeholder="Поиск в избранном..."></div><div id="favoritesGrid"></div></div>
    <div id="profilePage" class="page"><div id="profileContent"></div></div>
</div>

<div class="audio-player" id="audioPlayer"><div class="player-content"><div class="player-info"><div id="currentTrackTitle"></div><div id="currentTrackProducer" style="font-size:0.75rem;"></div></div><div class="player-controls"><button id="playPauseBtn"><i class="fas fa-play"></i></button><button id="stopBtn"><i class="fas fa-stop"></i></button></div><div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div></div></div>
<div id="cartModal" class="modal-overlay"><div class="modal-content"><h2>🛒 Корзина</h2><div id="cartItemsList"></div><div id="cartTotal" style="font-size:1.3rem; margin:20px 0;"></div><button id="checkoutBtn" class="submit-beat-btn" style="margin-top:0;">Оформить</button><button id="closeCartModal" class="cancel-btn" style="margin-top:12px;">Закрыть</button></div></div>
<div id="editProfileModal" class="modal-overlay"><div class="modal-content"><h2>✏️ Редактировать профиль</h2><div class="form-group"><label>Никнейм</label><input type="text" id="editName"></div><div class="form-group"><label>E-mail</label><input type="email" id="editEmail"></div><div class="form-group"><label>Telegram username</label><input type="text" id="editTelegram" placeholder="@username"></div><div class="form-group"><label>О себе</label><textarea id="editBio" rows="3"></textarea></div><div class="form-group"><label>Соцсети</label><input type="text" id="editSocials" placeholder="https://..."></div><div class="form-group"><label>Подпись</label><div class="signature-area"><div class="signature-canvas-container"><canvas id="editSignatureCanvas" width="400" height="150"></canvas></div><div class="signature-buttons"><button id="clearEditSignature">Очистить</button><button id="undoEditSignature">Отменить</button></div></div></div><div class="button-group"><button id="saveProfileChangesBtn" class="submit-beat-btn">Сохранить</button><button id="closeEditProfileModal" class="cancel-btn">Отмена</button></div></div></div>
<div id="editItemModal" class="modal-overlay"><div class="modal-content" id="editItemModalContent"></div></div>
<div id="toast" class="toast" style="opacity:0; visibility:hidden;"></div>

<script>
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.expand(); tg.ready(); }

    let isRegistered = localStorage.getItem('beatwave_registered') === 'true';
    let currentUser = null;
    
    const keyOptions = ["C", "C#/Db", "D", "D#/Eb", "E", "F", "F#/Gb", "G", "G#/Ab", "A", "A#/Bb", "B", "Cm", "C#m", "Dm", "D#m", "Em", "Fm", "F#m", "Gm", "G#m", "Am", "A#m", "Bm"];
    
    let beatsCatalog = JSON.parse(localStorage.getItem('beatwave_catalog') || JSON.stringify([
        { id: 1, title: "Midnight Vibe", producer: "LXRY BEATS", tags: "trap, dark", bpm: 140, key: "A Minor", price: 2990, cover: null, audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", plays: 245, type: "beat", authorId: 1 },
        { id: 2, title: "Sunset Melody", producer: "SoulProd", tags: "lofi, chill", bpm: 85, key: "C Major", price: 2490, cover: null, audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", plays: 189, type: "beat", authorId: 2 },
        { id: 3, title: "Rage Mode", producer: "BassKick", tags: "trap, aggressive", bpm: 150, key: "D# Minor", price: 3490, cover: null, audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", plays: 312, type: "beat", authorId: 3 }
    ]));
    let kitsCatalog = JSON.parse(localStorage.getItem('beatwave_kits') || '[]');
    let servicesCatalog = JSON.parse(localStorage.getItem('beatwave_services') || '[]');
    let cart = JSON.parse(localStorage.getItem('beatwave_cart') || '[]');
    let favorites = JSON.parse(localStorage.getItem('beatwave_favorites') || '[]');
    let currentMainType = "beats";
    let currentUploadType = "beat";
    let currentProfileSection = "beats";
    let currentAudio = null, isPlaying = false;
    let searchQuery = "";
    let favSearchQuery = "";

    function saveAll() {
        localStorage.setItem('beatwave_catalog', JSON.stringify(beatsCatalog));
        localStorage.setItem('beatwave_kits', JSON.stringify(kitsCatalog));
        localStorage.setItem('beatwave_services', JSON.stringify(servicesCatalog));
        localStorage.setItem('beatwave_cart', JSON.stringify(cart));
        localStorage.setItem('beatwave_favorites', JSON.stringify(favorites));
        if (currentUser) localStorage.setItem('beatwave_user', JSON.stringify(currentUser));
    }
    function showToast(msg, duration=2500) { const t=document.getElementById('toast'); t.textContent=msg; t.style.opacity='1'; t.style.visibility='visible'; setTimeout(()=>{ t.style.opacity='0'; t.style.visibility='hidden'; }, duration); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]); }
    function formatPrice(price) { return new Intl.NumberFormat('ru-RU').format(price) + ' ₽'; }

    function playAudio(url, title, producer) {
        if(!url) { showToast("Аудио недоступно"); return; }
        if(currentAudio) currentAudio.pause();
        currentAudio = new Audio(url);
        const playBtn = document.getElementById('playPauseBtn'), fill = document.getElementById('progressFill');
        currentAudio.addEventListener('timeupdate', () => { if(currentAudio?.duration) fill.style.width = `${(currentAudio.currentTime/currentAudio.duration)*100}%`; });
        currentAudio.addEventListener('ended', () => { playBtn.innerHTML = '<i class="fas fa-play"></i>'; isPlaying = false; fill.style.width = '0%'; });
        currentAudio.play();
        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        isPlaying = true;
        document.getElementById('currentTrackTitle').innerText = title;
        document.getElementById('currentTrackProducer').innerText = producer;
        document.getElementById('audioPlayer').classList.add('active');
        if(currentUser) { currentUser.plays = (currentUser.plays || 0) + 1; saveAll(); }
    }
    function initAudioPlayer() {
        const playBtn = document.getElementById('playPauseBtn'), stopBtn = document.getElementById('stopBtn'), prog = document.getElementById('progressBar'), fill = document.getElementById('progressFill');
        playBtn.onclick = () => { if(!currentAudio) return; if(isPlaying) { currentAudio.pause(); playBtn.innerHTML = '<i class="fas fa-play"></i>'; isPlaying = false; } else { currentAudio.play(); playBtn.innerHTML = '<i class="fas fa-pause"></i>'; isPlaying = true; } };
        stopBtn.onclick = () => { if(currentAudio){ currentAudio.pause(); currentAudio.currentTime = 0; playBtn.innerHTML = '<i class="fas fa-play"></i>'; isPlaying = false; fill.style.width = '0%'; } };
        prog.onclick = (e) => { if(!currentAudio) return; const rect = prog.getBoundingClientRect(); const percent = (e.clientX - rect.left) / rect.width; currentAudio.currentTime = percent * currentAudio.duration; };
    }

    function getPopularBeats() { return [...beatsCatalog].sort((a,b) => (b.plays||0) - (a.plays||0)).slice(0, 6); }
    function getPopularProducers() {
        const producerPlays = {};
        beatsCatalog.forEach(beat => { producerPlays[beat.producer] = (producerPlays[beat.producer] || 0) + (beat.plays||0); });
        return Object.entries(producerPlays).sort((a,b) => b[1] - a[1]).slice(0, 6).map(([name]) => ({ name, plays: producerPlays[name] }));
    }

    function filterItems(items, query) {
        if(!query) return items;
        const q = query.toLowerCase();
        return items.filter(item => 
            item.title.toLowerCase().includes(q) || 
            (item.producer || '').toLowerCase().includes(q) ||
            (item.tags || '').toLowerCase().includes(q) || 
            (item.bpm && item.bpm.toString().includes(q))
        );
    }

        else items = servicesCatalog.filter(s=>s.authorId===currentUser.id);
        if(search) items = items.filter(i => i.title.toLowerCase().includes(search.toLowerCase()) || (i.tags || '').toLowerCase().includes(search.toLowerCase()) || (i.bpm && i.bpm.toString().includes(search)));
        if(items.length===0){ container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--tg-hint);">Нет элементов</div>'; return; }
        container.innerHTML = items.map(item => {
            const isBeat = section === 'beats';
            return `<div class="item-row"><div class="item-cover-small">${item.cover ? `<img src="${item.cover}">` : `<i class="fas ${section==='beats'?'fa-music':section==='kits'?'fa-drum':'fa-cogs'}"></i>`}</div><div class="item-info"><div class="item-title">${escapeHtml(item.title)}</div><div class="item-price">${formatPrice(item.price)}</div><div class="item-tags">${(item.tags || '').split(',').map(t=>`<span class="tag">${t.trim()}</span>`).join('')}</div>${item.bpm ? `<div class="item-tags"><span class="tag">${item.bpm} BPM</span>${item.key ? `<span class="tag">${item.key}</span>` : ''}</div>` : (item.key ? `<div class="item-tags"><span class="tag">${item.key}</span></div>` : '')}</div><div class="item-actions">${isBeat ? `<button class="play-item-btn" data-audio="${item.audioUrl || ''}" data-title="${escapeHtml(item.title)}"><i class="fas fa-play"></i></button>` : ''}<button class="edit-item-btn" data-id="${item.id}" data-type="${section.slice(0,-1)}"><i class="fas fa-edit"></i></button></div></div>`;
        }).join('');
        document.querySelectorAll('.play-item-btn').forEach(btn => { if(btn.dataset.audio) btn.addEventListener('click', () => playAudio(btn.dataset.audio, btn.dataset.title, currentUser.nickname)); });
        document.querySelectorAll('.edit-item-btn').forEach(btn => btn.addEventListener('click', () => openEditModal(btn.dataset.id, btn.dataset.type)));
    }
    
    function openEditModal(id, type) {
        let item;
        if(type === 'beat') item = beatsCatalog.find(i => i.id == id);
        else if(type === 'kit') item = kitsCatalog.find(i => i.id == id);
        else item = servicesCatalog.find(i => i.id == id);
        if(!item) return;
        
        let html = `<h2>✏️ Редактировать ${type}</h2><div class="form-group"><label>Название *</label><input id="editItemTitle" value="${escapeHtml(item.title)}"></div><div class="form-group"><label>Цена * (₽)</label><input id="editItemPrice" type="number" step="100" value="${item.price}"></div>`;
        if(type === 'beat') {
            html += `<div class="form-group"><label>Тэги</label><input id="editItemTags" value="${item.tags || ''}"></div><div class="form-group"><label>BPM</label><input id="editItemBpm" type="number" value="${item.bpm || 0}"></div><div class="form-group"><label>Тональность</label><select id="editItemKey" class="key-select"><option value="">Выберите тональность</option>${keyOptions.map(k=>`<option value="${k}" ${item.key===k?'selected':''}>${k}</option>`).join('')}</select></div><div class="form-group"><div class="upload-area" id="editCoverArea"><i class="fas fa-image"></i> Обложка (необязательно)<input type="file" id="editCoverFile" accept="image/*" style="display:none"><div id="editCoverPreview" class="upload-status"></div></div></div><div class="form-group"><div class="upload-area" id="editAudioArea"><i class="fas fa-music"></i> Аудио файл (замените при необходимости)<input type="file" id="editAudioFile" accept="audio/*" style="display:none"><div id="editAudioPreview" class="upload-status"></div></div></div>`;
        }
        if(type === 'kit') html += `<div class="form-group"><label>Описание</label><textarea id="editItemDesc" rows="3">${escapeHtml(item.description || '')}</textarea></div><div class="form-group"><div class="upload-area" id="editCoverArea"><i class="fas fa-image"></i> Обложка (необязательно)<input type="file" id="editCoverFile" accept="image/*" style="display:none"><div id="editCoverPreview" class="upload-status"></div></div></div><div class="form-group"><div class="upload-area" id="editZipArea"><i class="fas fa-file-archive"></i> ZIP/RAR файл (замените при необходимости)<input type="file" id="editZipFile" accept=".zip,.rar" style="display:none"><div id="editZipPreview" class="upload-status"></div></div></div>`;
        if(type === 'service') html += `<div class="form-group"><label>Описание</label><textarea id="editItemDesc" rows="3">${escapeHtml(item.description || '')}</textarea></div>`;
        html += `<div class="button-group"><button id="saveEditBtn" class="submit-beat-btn">Сохранить</button><button id="deleteItemBtn" class="cancel-btn delete-btn">Удалить</button><button id="closeEditModalBtn" class="cancel-btn">Отмена</button></div>`;
        
        document.getElementById('editItemModalContent').innerHTML = html;
        document.getElementById('editItemModal').classList.add('active');
        
        if(type === 'beat' || type === 'kit') {
            let newCover = null;
            document.getElementById('editCoverArea')?.addEventListener('click',()=>document.getElementById('editCoverFile').click());
            document.getElementById('editCoverFile')?.addEventListener('change',(e)=>{ if(e.target.files[0]){ const r=new FileReader(); r.onload=ev=>{ newCover=ev.target.result; document.getElementById('editCoverPreview').innerHTML='✅ Обложка загружена'; }; r.readAsDataURL(e.target.files[0]); } });
            if(type === 'beat') {
                let newAudio = null;
                document.getElementById('editAudioArea')?.addEventListener('click',()=>document.getElementById('editAudioFile').click());
                document.getElementById('editAudioFile')?.addEventListener('change',(e)=>{ if(e.target.files[0]){ const r=new FileReader(); r.onload=ev=>{ newAudio=ev.target.result; document.getElementById('editAudioPreview').innerHTML='✅ Аудио загружено'; }; r.readAsDataURL(e.target.files[0]); } });
                document.getElementById('saveEditBtn').onclick = () => {
                    item.title = document.getElementById('editItemTitle').value;
                    item.price = parseInt(document.getElementById('editItemPrice').value);
                    item.tags = document.getElementById('editItemTags').value;
                    item.bpm = parseInt(document.getElementById('editItemBpm').value) || 0;
                    item.key = document.getElementById('editItemKey').value;
                    if(newCover) item.cover = newCover;
                    if(newAudio) item.audioUrl = newAudio;
                    saveAll(); renderProfilePage(); renderMarket();
                    document.getElementById('editItemModal').classList.remove('active');
                    showToast("Сохранено");
                };
            } else if(type === 'kit') {
                let newZip = null;
                document.getElementById('editZipArea')?.addEventListener('click',()=>document.getElementById('editZipFile').click());
                document.getElementById('editZipFile')?.addEventListener('change',(e)=>{ if(e.target.files[0]){ newZip=e.target.files[0].name; document.getElementById('editZipPreview').innerHTML='✅ ZIP файл выбран'; } });
                document.getElementById('saveEditBtn').onclick = () => {
                    item.title = document.getElementById('editItemTitle').value;
                    item.price = parseInt(document.getElementById('editItemPrice').value);
                    item.description = document.getElementById('editItemDesc').value;
                    if(newCover) item.cover = newCover;
                    if(newZip) item.fileName = newZip;
                    saveAll(); renderProfilePage(); renderMarket();
                    document.getElementById('editItemModal').classList.remove('active');
                    showToast("Сохранено");
                };
            }
        } else {
            document.getElementById('saveEditBtn').onclick = () => {
                item.title = document.getElementById('editItemTitle').value;
                item.price = parseInt(document.getElementById('editItemPrice').value);
                item.description = document.getElementById('editItemDesc').value;
                saveAll(); renderProfilePage(); renderMarket();
                document.getElementById('editItemModal').classList.remove('active');
                showToast("Сохранено");
            };
        }
        document.getElementById('deleteItemBtn').onclick = () => {
            if(type === 'beat') beatsCatalog = beatsCatalog.filter(i => i.id != id);
            else if(type === 'kit') kitsCatalog = kitsCatalog.filter(i => i.id != id);
            else servicesCatalog = servicesCatalog.filter(i => i.id != id);
            saveAll(); renderProfilePage(); renderMarket();
            document.getElementById('editItemModal').classList.remove('active');
            showToast("Удалено");
        };
        document.getElementById('closeEditModalBtn').onclick = () => document.getElementById('editItemModal').classList.remove('active');
    }

    // Регистрация
    let regCanvas=null, regCtx=null, regHistory=[], regWidth=400, regHeight=150;
    function initRegSignature() {
        const canvas = document.getElementById('signatureCanvas');
        if(!canvas) return;
        const container = canvas.parentElement;
        regWidth = container.clientWidth || 400;
        regHeight = 150;
        canvas.width = regWidth; canvas.height = regHeight;
        canvas.style.width = '100%';
        regCtx = canvas.getContext('2d');
        regCtx.fillStyle = 'white'; regCtx.fillRect(0,0,regWidth,regHeight);
        regCtx.strokeStyle = '#000'; regCtx.lineWidth = 2;
        regHistory = [];
        const save = () => { const img = regCtx.getImageData(0,0,regWidth,regHeight); regHistory.push(img); if(regHistory.length>20) regHistory.shift(); };
        let draw=false;
        const start=(e)=>{ draw=true; const p=getPos(e); regCtx.beginPath(); regCtx.moveTo(p.x,p.y); e.preventDefault(); };
        const move=(e)=>{ if(!draw) return; const p=getPos(e); regCtx.lineTo(p.x,p.y); regCtx.stroke(); regCtx.beginPath(); regCtx.moveTo(p.x,p.y); };
        const end=()=>{ draw=false; save(); };
        const getPos=(e)=>{ const rect=canvas.getBoundingClientRect(); const scaleX=canvas.width/rect.width; const scaleY=canvas.height/rect.height; let cx,cy; if(e.touches){ cx=e.touches[0].clientX; cy=e.touches[0].clientY; }else{ cx=e.clientX; cy=e.clientY; } return { x:(cx-rect.left)*scaleX, y:(cy-rect.top)*scaleY }; };
        canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); canvas.addEventListener('mouseup',end); canvas.addEventListener('touchstart',start); canvas.addEventListener('touchmove',move); canvas.addEventListener('touchend',end);
        window.clearRegSig = () => { regCtx.fillStyle='white'; regCtx.fillRect(0,0,regWidth,regHeight); regHistory=[]; save(); };
        window.undoRegSig = () => { if(regHistory.length>1){ regHistory.pop(); regCtx.putImageData(regHistory[regHistory.length-1],0,0); } };
        document.getElementById('clearSig')?.addEventListener('click',()=>window.clearRegSig());
        document.getElementById('undoSig')?.addEventListener('click',()=>window.undoRegSig());
    }
    function isSignatureEmpty() { if(!regCtx) return true; const img=regCtx.getImageData(0,0,regWidth,regHeight); for(let i=0;i<img.data.length;i+=4) if(img.data[i]<250 || img.data[i+1]<250 || img.data[i+2]<250) return false; return true; }
    function registerUser() {
        const nickname = document.getElementById('regNickname')?.value.trim();
        const email = document.getElementById('regEmail')?.value.trim();
        const fullname = document.getElementById('regFullname')?.value.trim();
        const telegram = document.getElementById('regTelegram')?.value.trim();
        if(!nickname){ showToast("Введите никнейм"); return; }
        if(!email || !email.includes('@')){ showToast("Введите корректный email"); return; }
        if(!fullname){ showToast("Введите ФИО"); return; }
        if(isSignatureEmpty()){ showToast("Нарисуйте подпись"); return; }
        currentUser = { id: Date.now(), nickname, email, fullname, telegram, signature: document.getElementById('signatureCanvas').toDataURL(), registeredAt: new Date().toISOString(), avatar: null, bio: "Музыкант на BeatWave", plays: 0, likes: 0, followers: 0, socials: "" };
        localStorage.setItem('beatwave_registered', 'true');
        localStorage.setItem('beatwave_user', JSON.stringify(currentUser));
        isRegistered = true;
        showToast("✅ Регистрация успешна!");
        renderProfilePage();
        renderUploadForm();
    }

        const end=()=>{ draw=false; save(); };
        const getPos=(e)=>{ const rect=canvas.getBoundingClientRect(); const scaleX=canvas.width/rect.width; const scaleY=canvas.height/rect.height; let cx,cy; if(e.touches){ cx=e.touches[0].clientX; cy=e.touches[0].clientY; }else{ cx=e.clientX; cy=e.clientY; } return { x:(cx-rect.left)*scaleX, y:(cy-rect.top)*scaleY }; };
        canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); canvas.addEventListener('mouseup',end); canvas.addEventListener('touchstart',start); canvas.addEventListener('touchmove',move); canvas.addEventListener('touchend',end);
        window.clearEditSig = () => { editCtx.fillStyle='white'; editCtx.fillRect(0,0,editCanvasWidth,editCanvasHeight); editHistory=[]; save(); };
        window.undoEditSig = () => { if(editHistory.length>1){ editHistory.pop(); editCtx.putImageData(editHistory[editHistory.length-1],0,0); } };
        document.getElementById('clearEditSignature')?.addEventListener('click',()=>window.clearEditSig());
        document.getElementById('undoEditSignature')?.addEventListener('click',()=>window.undoEditSig());
        if(currentUser?.signature) { const img=new Image(); img.onload=()=>editCtx.drawImage(img,0,0,editCanvasWidth,editCanvasHeight); img.src=currentUser.signature; }
    }

    document.getElementById('saveProfileChangesBtn')?.addEventListener('click', () => {
    const oldNickname = currentUser.nickname;
    const newNickname = document.getElementById('editName').value;
    
    // Обновляем данные пользователя
    currentUser.nickname = newNickname;
    currentUser.email = document.getElementById('editEmail').value;
    currentUser.telegram = document.getElementById('editTelegram').value;
    currentUser.bio = document.getElementById('editBio').value;
    currentUser.socials = document.getElementById('editSocials').value;
    
    // Если ник изменился, обновляем во всех товарах пользователя
    if (oldNickname !== newNickname) {
        // Обновляем биты
        beatsCatalog.forEach(beat => {
            if (beat.authorId === currentUser.id) {
                beat.producer = newNickname;
            }
        });
        // Обновляем киты
        kitsCatalog.forEach(kit => {
            if (kit.authorId === currentUser.id) {
                kit.producer = newNickname;
            }
        });
        // Обновляем услуги
        servicesCatalog.forEach(service => {
            if (service.authorId === currentUser.id) {
                service.producer = newNickname;
            }
        });
    }
    
    if(editCtx && !(editCtx.getImageData(0,0,editCanvasWidth,editCanvasHeight).data.every((v,i)=>v===255))) {
        currentUser.signature = document.getElementById('editSignatureCanvas').toDataURL();
    }
    
    saveAll();
    renderProfilePage();
    renderMarket();
    renderFavorites();
    document.getElementById('editProfileModal').classList.remove('active');
    showToast("Профиль обновлён");
});
    document.getElementById('closeEditProfileModal')?.addEventListener('click', () => document.getElementById('editProfileModal').classList.remove('active'));
    document.getElementById('closeCartModal')?.addEventListener('click', () => document.getElementById('cartModal').classList.remove('active'));
    document.getElementById('checkoutBtn')?.addEventListener('click', () => { if(cart.length===0) showToast("Корзина пуста"); else { showToast("Заказ оформлен!"); cart = []; saveAll(); updateCartUI(); document.getElementById('cartModal').classList.remove('active'); } });
    document.getElementById('cartBtn').onclick = () => { renderCartModal(); document.getElementById('cartModal').classList.add('active'); };
    document.querySelectorAll('.modal-overlay').forEach(overlay => overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.classList.remove('active'); }));
    
    function switchPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`${page}Page`).classList.add('active');
        document.querySelectorAll('.nav-tab').forEach(t => { t.classList.remove('active'); if(t.dataset.page === page) t.classList.add('active'); });
        if(page === 'home') { renderMarket(); renderPopularBeats(); renderPopularProducers(); }
        if(page === 'favorites') renderFavorites();
        if(page === 'profile') renderProfilePage();
        if(page === 'upload') renderUploadForm();
    }
    document.querySelectorAll('.nav-tab').forEach(tab => tab.addEventListener('click', () => switchPage(tab.dataset.page)));
    document.querySelectorAll('.main-tab').forEach(tab => tab.addEventListener('click', () => { document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); currentMainType = tab.dataset.main; searchQuery = ""; document.getElementById('searchInput').value = ""; renderMarket(); }));
    document.getElementById('searchInput')?.addEventListener('input', (e) => { searchQuery = e.target.value; renderMarket(); });
    document.getElementById('favSearchInput')?.addEventListener('input', (e) => { favSearchQuery = e.target.value; renderFavorites(); });
    
    if (isRegistered) { const saved = localStorage.getItem('beatwave_user'); if(saved) currentUser = JSON.parse(saved); else isRegistered = false; }
    initAudioPlayer(); renderMarket(); renderPopularBeats(); renderPopularProducers(); updateCartUI(); renderProfilePage(); renderUploadForm();
    window.playAudio = playAudio;
</script>
