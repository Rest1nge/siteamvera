<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>BeatWave — Музыкальная платформа</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    :root {
        --tg-bg: var(--tg-theme-bg-color, #0a0a0f);
        --tg-text: var(--tg-theme-text-color, #ffffff);
        --tg-hint: var(--tg-theme-hint-color, #a0a0b0);
        --tg-button: var(--tg-theme-button-color, #7c3aed);
        --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
        --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #16161f);
        --card-bg: rgba(18, 18, 26, 0.92);
        --accent: #7c3aed;
        --accent2: #c026d3;
        --gradient-1: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
        --gradient-2: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
        --gradient-3: linear-gradient(135deg, #22d3ee 0%, #6366f1 100%);
        --shadow-lg: 0 25px 50px -12px rgb(0 0 0 / 0.6);
        --glow: 0 0 25px rgba(124, 58, 237, 0.35);
        --glow2: 0 0 20px rgba(236, 72, 153, 0.3);
        --success: #22c55e;
    }

    /* ==================== ГЛОБАЛЬНЫЙ ШРИФТ ==================== */
    body {
    font-family: 'JetBrains Mono', 'Segoe UI', Roboto, monospace;
    background: #050507;
    color: var(--tg-text);
    overflow-x: hidden;
    position: relative;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}

    h1, h2, h3, h4, .beat-title, .profile-username, .item-title, .nav-tab, .submit-beat-btn, .buy-btn, .add-to-cart, .section-tab, .cart-btn, .register-submit-btn {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
}


    /* ==================== АНИМИРОВАННЫЙ ФОН (темнее + размытее) ==================== */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: -2;
        background: linear-gradient(135deg, 
            #0a0a0f 0%, 
            #1a0f2e 40%, 
            #2a1a3d 70%, 
            #0f0a1f 100%);
        filter: blur(90px);
        opacity: 0.95;
        animation: gradientFall 40s ease infinite;
        background-size: 150% 150%;
    }

    body::after {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: -1;
        background: linear-gradient(135deg, 
            rgba(124, 58, 237, 0.12) 0%, 
            rgba(192, 38, 211, 0.08) 30%, 
            rgba(236, 72, 153, 0.10) 60%, 
            rgba(124, 58, 237, 0.07) 100%);
        filter: blur(60px);
        animation: gradientFall 55s linear infinite;
        opacity: 0.7;
    }

    @keyframes gradientFall {
        0%   { background-position: 0% 0%; }
        50%  { background-position: 100% 100%; }
        100% { background-position: 0% 0%; }
    }

    .app-container { 
        position: relative; 
        z-index: 1; 
        max-width: 1480px; 
        margin: 0 auto; 
        padding: 20px 24px 120px 24px; 
    }

    /* ==================== ТАБЫ ==================== */
    .nav-tabs { 
        display: flex; 
        gap: 10px; 
        background: rgba(15,15,23,0.85); 
        backdrop-filter: blur(20px); 
        padding: 10px; 
        border-radius: 9999px; 
        margin-bottom: 32px; 
        border: 1px solid rgba(255,255,255,0.07);
    }

    .nav-tab { 
        flex: 1; 
        padding: 14px 20px; 
        border: none; 
        background: transparent; 
        color: var(--tg-hint); 
        font-weight: 600; 
        font-size: 0.95rem; 
        border-radius: 9999px; 
        cursor: pointer; 
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex; 
        align-items: center; 
        justify-content: center; 
        gap: 10px;
    }

    .nav-tab i { font-size: 1.1rem; }

    .nav-tab.active { 
        background: var(--gradient-1); 
        color: white; 
        box-shadow: var(--glow); 
        transform: translateY(-2px);
    }

    .page { display: none; }
    .page.active { display: block; }

    /* ==================== АНИМАЦИИ ==================== */
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(25px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes heartbeat {
        0% { transform: scale(1); }
        50% { transform: scale(1.3); }
        100% { transform: scale(1); }
    }

    .page.active .beat-card,
    .page.active .item-row,
    .page.active .popular-beat-card,
    .page.active .popular-producer-card {
        transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    /* ==================== КАРТОЧКИ ==================== */
    .market-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }

    .cart-btn { 
        background: rgba(18, 18, 26, 0.92); 
        backdrop-filter: blur(20px); 
        border: 1px solid rgba(255,255,255,0.08); 
        padding: 12px 20px; 
        border-radius: 40px; 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        font-weight: 600; 
        cursor: pointer; 
        transition: all 0.3s; 
        color: var(--tg-text); 
    }

    .cart-count { background: #f43f5e; color: white; border-radius: 30px; padding: 2px 8px; font-size: 0.75rem; }

    .main-sections { display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }

    .main-tab { padding: 8px 20px; border-radius: 40px; cursor: pointer; transition: all 0.3s; background: transparent; color: var(--tg-hint); font-weight: 600; }
    .main-tab.active { 
    background: linear-gradient(135deg, #5a2ab0 0%, #8b3fc0 100%);
    color: white; 
    box-shadow: var(--glow);
    transform: translateY(-2px);
    opacity: 0.95;
}
.main-tab:active {
    transform: scale(0.98);
    background: rgba(124,58,237,0.3);
    transition: all 0.05s ease;
}

    /* ==================== ПОИСК ==================== */
    .search-bar { margin-bottom: 24px; position: relative; }

    .search-input { 
        width: 100%; 
        padding: 16px 20px 16px 52px; 
        background: rgba(255,255,255,0.05); 
        border: 1px solid rgba(255,255,255,0.1); 
        border-radius: 9999px; 
        color: var(--tg-text); 
        font-size: 1rem; 
        transition: all 0.3s; 
    }

    .search-input:focus { 
        outline: none; 
        border-color: #a855f7; 
        box-shadow: var(--glow); 
        background: rgba(255,255,255,0.08);
    }

    .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--tg-hint); }

    /* ==================== ПОПУЛЯРНОЕ ==================== */
    .popular-section { margin-bottom: 32px; overflow: visible;}
    .popular-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--tg-hint); }

.popular-section {
    margin-bottom: 32px;
    overflow: visible;
}
.popular-grid {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    overflow-y: visible;
    padding: 12px 12px 20px 12px;
    scrollbar-width: none;
    -ms-overflow-style: none;
}
    .popular-grid::-webkit-scrollbar { display: none; }

    .popular-beat-card,
    .popular-producer-card {
    background: rgba(18, 18, 26, 0.92);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 12px 20px;
    min-width: 180px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer;
    transition: all 0.28s ease;
}

    .popular-beat-card:hover,
    .popular-producer-card:hover {
    transform: translateY(-4px) scale(1.015);
    box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    border-color: rgba(124,58,237,0.28);
}

    .popular-beat-cover { width: 50px; height: 50px; border-radius: 12px; background: var(--gradient-1); background-size: cover; }
    .popular-beat-info h4 { font-size: 0.9rem; font-weight: 700; }
    .popular-beat-info p { font-size: 0.7rem; color: var(--tg-hint); cursor: pointer; text-decoration: underline; text-decoration-thickness: 1px; }
    .popular-producer-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gradient-2); display: flex; align-items: center; justify-content: center; }

    /* ==================== СЕТКА БИТОВ ==================== */
    .beats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px; }

    .beat-card { 
        background: rgba(18, 18, 26, 0.92);
        backdrop-filter: blur(20px);
        border-radius: 24px; 
        overflow: hidden; 
        border: 1px solid rgba(255,255,255,0.08); 
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
    }

    .beat-card:hover { 
        transform: translateY(-8px) scale(1.02);
    box-shadow: var(--shadow-lg), var(--glow);
    }

    .beat-cover { 
        height: 200px; 
        background-size: cover; 
        background-position: center; 
        position: relative; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        overflow: hidden;
    }

    .beat-cover::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(transparent, rgba(0,0,0,0.4));
        opacity: 0;
        transition: 0.3s;
    }

    .beat-card:hover .beat-cover::after { opacity: 1; }

    .beat-cover.default { 
        height: 220px !important;
        background: linear-gradient(135deg,
        #667eea 0%, 
        #5a367e 100%); 
    }

    .play-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; cursor: pointer; z-index: 2; }
    .beat-card:hover .play-overlay { opacity: 1; }

    .play-btn { width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #7c3aed; font-size: 1.5rem; cursor: pointer; transition: transform 0.2s; }

    .beat-info { padding: 20px; }
    .beat-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.025em; }
    .beat-producer { font-size: 0.8rem; color: var(--tg-hint); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .beat-producer span { cursor: pointer; text-decoration: underline; text-decoration-thickness: 1px; transition: opacity 0.2s; }
    .beat-producer span:hover { opacity: 0.7; }

    .beat-tags { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }

    .tag { 
        background: rgba(124,58,237,0.12); 
        border: 1px solid rgba(124,58,237,0.25); 
        padding: 5px 12px; 
        border-radius: 9999px; 
        font-size: 0.78rem; 
        font-weight: 500;
    }

    .action-buttons { display: flex; gap: 12px; margin-top: 12px; }

    .price { 
        font-size: 1.5rem; 
        font-weight: 800; 
        background: var(--gradient-2); 
        background-clip: text; 
        -webkit-background-clip: text; 
        color: transparent; 
    }

    .add-to-cart, .favorite-btn, .buy-btn { 
        border: none; 
        padding: 10px 18px; 
        border-radius: 40px; 
        font-weight: 700;
        cursor: pointer; 
        transition: all 0.3s; 
    }

    .add-to-cart, .buy-btn { 
        background: var(--gradient-1); 
        color: white; 
        letter-spacing: 0.5px;
    }

    .add-to-cart:hover, .buy-btn:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 0 30px rgba(124,58,237,0.6);
    }

    .favorite-btn { background: rgba(255,255,255,0.1); color: var(--tg-text); transition: all 0.3s; }
    .favorite-btn.active { background: #f43f5e; color: white; animation: heartbeat 0.4s; }

    /* ==================== ПРОФИЛЬ ==================== */
    .profile-header { 
        background: rgba(18, 18, 26, 0.92); 
        backdrop-filter: blur(20px); 
        border-radius: 32px; 
        padding: 32px; 
        margin-bottom: 24px; 
        border: 1px solid rgba(255,255,255,0.08); 
        box-shadow: var(--shadow-lg);
    }

    .profile-avatar-large { 
        width: 120px; 
        height: 120px; 
        border-radius: 50%; 
        background: var(--gradient-1); 
        margin: 0 auto 16px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-size: 3rem; 
        overflow: hidden; 
        cursor: pointer; 
        border: 4px solid rgba(124,58,237,0.3); 
        box-shadow: var(--glow);
    }

    .profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; }
    .profile-username { text-align: center; font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; letter-spacing: -0.025em; }

    .profile-stats { display: flex; justify-content: center; gap: 32px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-item { text-align: center; }
    .stat-number { font-size: 1.5rem; font-weight: 800; background: var(--gradient-2); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .stat-label { font-size: 0.8rem; color: var(--tg-hint); }

    .edit-profile-btn { display: block; width: fit-content; margin: 0 auto 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 10px 28px; border-radius: 40px; color: var(--tg-text); font-weight: 600; cursor: pointer; }
    .profile-bio { text-align: center; padding: 16px; /*background: rgba(255,255,255,0.03)*/; border-radius: 20px; color: var(--tg-hint); line-height: 1.6; margin-bottom: 5px;}

    .profile-sections { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .section-tab { flex: 1; padding: 14px 20px; background: rgba(18, 18, 26, 0.92); border: 1px solid rgba(255,255,255,0.05); border-radius: 60px; cursor: pointer; text-align: center; font-weight: 700; color: var(--tg-hint); transition: all 0.3s; }
    .section-tab.active { background: var(--gradient-1); color: white; box-shadow: var(--glow); }
    .section-tab span { font-size: 0.85rem; margin-left: 8px; }

    /* ==================== СПИСКИ ==================== */
    .items-list { display: flex; flex-direction: column; gap: 16px; }

    .item-row { 
        background: rgba(18, 18, 26, 0.92);
        backdrop-filter: blur(20px);
        border-radius: 20px; 
        padding: 16px; 
        display: flex; 
        align-items: center; 
        gap: 16px; 
        border: 1px solid rgba(255,255,255,0.08); 
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .item-row:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg);
        border-color: rgba(124,58,237,0.3);
    }

    .item-cover-small { width: 60px; height: 60px; border-radius: 16px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--gradient-1); }
    .item-cover-small img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
    .item-info { flex: 1; }
    .item-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; letter-spacing: -0.025em; }
    .item-price { font-size: 0.9rem; font-weight: 600; color: #a78bfa; }
    .item-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .item-actions { display: flex; gap: 8px; }
    .item-actions button { background: rgba(255,255,255,0.1); border: none; width: 36px; height: 36px; border-radius: 50%; color: var(--tg-text); cursor: pointer; transition: all 0.2s; }

    /* ==================== ФОРМЫ ==================== */
    .upload-form { background: rgba(18, 18, 26, 0.92); backdrop-filter: blur(20px); border-radius: 32px; padding: 32px; max-width: 600px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.08); }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--tg-text); }
    .form-group input, .form-group select { 
        width: 100%; 
        padding: 12px 16px; 
        background: rgba(255,255,255,0.05); 
        border: 1px solid rgba(255,255,255,0.1); 
        border-radius: 16px; 
        color: var(--tg-text); 
        font-size: 1rem; 
        transition: all 0.3s;
    }

    .form-group input:focus, .form-group select:focus {
        outline: none;
        border-color: #7c3aed;
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
        transform: translateY(-1px);
    }

    .form-group select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 20px; }
    .form-group textarea { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: var(--tg-text); font-size: 1rem; resize: vertical; min-height: 80px; transition: all 0.3s; }
    .form-group textarea:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2); }

    .upload-area { border: 2px dashed rgba(255,255,255,0.2); border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .upload-area:hover { border-color: #7c3aed; background: rgba(124,58,237,0.05); }
    .upload-status { font-size: 0.85rem; margin-top: 8px; }
    .upload-status.success { color: var(--success); }

    .submit-beat-btn { 
        width: 100%; 
        background: var(--gradient-1); 
        border: none; 
        padding: 14px; 
        border-radius: 40px; 
        color: white; 
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer; 
        margin-top: 10px; 
        transition: all 0.3s ease; 
    }

    .submit-beat-btn:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 0 30px rgba(124,58,237,0.6);
    }

    .button-group { display: flex; gap: 12px; margin-top: 20px; }
    .cancel-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 14px; border-radius: 40px; color: var(--tg-text); font-weight: 600; cursor: pointer; flex: 1; }
    .delete-btn { background: rgba(245,87,108,0.2); border: 1px solid #f5576c; color: #f5576c; }

    /* ==================== РЕГИСТРАЦИЯ ==================== */
    .registration-card { 
        background: rgba(18, 18, 26, 0.92); 
        backdrop-filter: blur(20px);
        border-radius: 32px; 
        padding: 32px; 
        border: 1px solid rgba(255,255,255,0.08); 
        box-shadow: var(--shadow-lg);
    }

    .signature-area { border: 2px dashed rgba(255,255,255,0.2); border-radius: 20px; padding: 16px; margin-top: 8px; }
    .signature-canvas-container { background: white; border-radius: 12px; margin-bottom: 12px; }
    canvas.signature-canvas { display: block; width: 100%; height: 150px; background: white; border-radius: 12px; cursor: crosshair; touch-action: none; }
    .signature-buttons { display: flex; gap: 12px; justify-content: center; }
    .signature-buttons button { background: rgba(255,255,255,0.1); border: none; padding: 8px 16px; border-radius: 30px; color: var(--tg-text); cursor: pointer; }
    .register-submit-btn { width: 100%; background: var(--gradient-1); border: none; padding: 16px; border-radius: 60px; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 20px; }

    /* ==================== АУДИОПЛЕЕР ==================== */
    
.audio-player {
    position: fixed;
    bottom: 12px;
    left: 12px;
    right: 12px;
    background: rgba(15, 15, 23, 0.96);
    backdrop-filter: blur(24px);
    border-top: 1px solid rgba(124,58,237,0.3);
    padding: 10px 16px;
    z-index: 10001;
    transform: translateY(120%);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border-radius: 24px;
}

.audio-player.active { transform: translateY(0); }

.player-content {
    display: flex;
    align-items: center;
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
}

.player-cover {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: var(--gradient-1);
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    transition: transform 0.3s ease;
}

.player-main {
    flex: 1;
    min-width: 0;
}

.player-title {
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.player-producer {
    font-size: 0.75rem;
    color: #a0a0b0;
}

.player-producer span {
    cursor: pointer;
    text-decoration: underline;
    text-decoration-thickness: 1px;
}

.progress-container {
    flex: 1;
    margin: 8px 0;
}

.progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 9999px;
    cursor: pointer;
    position: relative;
    margin-bottom: 4px;
}

    { id: 2, title: "Sunset Melody", producer: "SoulProd", tags: "lofi, chill", bpm: 85, key: "C Major", price: 2490, cover: null, audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", plays: 189, type: "beat", authorId: 2 },
    { id: 3, title: "Rage Mode", producer: "BassKick", tags: "trap, aggressive", bpm: 150, key: "D# Minor", price: 3490, cover: null, audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", plays: 312, type: "beat", authorId: 3 }
]));    let kitsCatalog = JSON.parse(localStorage.getItem('beatwave_kits') || '[]');

function isValidTelegramUsername(username) {
    if (!username) return false;
    // Должен начинаться с @, затем латиница, цифры, нижнее подчеркивание
    const regex = /^@[a-zA-Z0-9_]+$/;
    return regex.test(username);
}
function getSocialUsername(url) {
    if (!url) return '';
    try {
        // Убираем протокол и www
        let cleanUrl = url.replace(/^https?:\/\//, '').replace(/^www\./, '');
        
        // Instagram
        if (cleanUrl.includes('instagram.com')) {
            const match = cleanUrl.match(/instagram\.com\/([^\/?#]+)/);
            return match ? `@${match[1]}` : 'Instagram';
        }
        // SoundCloud
        if (cleanUrl.includes('soundcloud.com')) {
            const match = cleanUrl.match(/soundcloud\.com\/([^\/?#]+)/);
            return match ? match[1] : 'SoundCloud';
        }
        // YouTube
        if (cleanUrl.includes('youtube.com') || cleanUrl.includes('youtu.be')) {
            const match = cleanUrl.match(/(?:youtube\.com\/@|youtu\.be\/)([^\/?#]+)/);
            if (match) return match[1];
            const shortMatch = cleanUrl.match(/\/(@[^\/?#]+)/);
            return shortMatch ? shortMatch[1] : 'YouTube';
        }
        // Twitter / X
        if (cleanUrl.includes('twitter.com') || cleanUrl.includes('x.com')) {
            const match = cleanUrl.match(/twitter\.com\/([^\/?#]+)/);
            return match ? `@${match[1]}` : 'Twitter';
        }
        // Telegram
        if (cleanUrl.includes('t.me')) {
            const match = cleanUrl.match(/t\.me\/([^\/?#]+)/);
            return match ? `@${match[1]}` : 'Telegram';
        }
        // Для других соцсетей - просто название домена
        const domain = cleanUrl.split('/')[0];
        return domain;
    } catch(e) {
        return 'Ссылка';
    }
}

function isValidEmail(email) {
    if (!email) return false;
    // Проверка на наличие @ и точки после @
    const atIndex = email.indexOf('@');
    if (atIndex === -1) return false;
    const dotAfterAt = email.indexOf('.', atIndex);
    if (dotAfterAt === -1) return false;
    // Проверка, что точка не сразу после @ и не в конце
    if (dotAfterAt === atIndex + 1) return false;
    if (dotAfterAt === email.length - 1) return false;
    // Проверка, что до @ есть хотя бы один символ
    if (atIndex === 0) return false;
    return true;
}

function saveAll() {

    if (currentUser) {
        // Сохраняем текущие избранное и корзину в объект пользователя
        currentUser.favorites = [...favorites];
        currentUser.cart = [...cart];
        
        // Синхронизация с общим списком пользователей
        let users = JSON.parse(localStorage.getItem('beatwave_users') || '[]');
        const userIndex = users.findIndex(u => u.id === currentUser.id);
        
        if (userIndex !== -1) {
            users[userIndex] = { ...currentUser };
        } else {
            users.push({ ...currentUser });
        }
        
        localStorage.setItem('beatwave_users', JSON.stringify(users));
        localStorage.setItem('beatwave_user', JSON.stringify(currentUser));
        localStorage.setItem('beatwave_registered', 'true');
        
        // Также сохраняем отдельно для обратной совместимости
        localStorage.setItem('beatwave_cart', JSON.stringify(cart));
        localStorage.setItem('beatwave_favorites', JSON.stringify(favorites));

}

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]); }
    function formatPrice(price) { return new Intl.NumberFormat('ru-RU').format(price) + ' ₽'; }

let currentTrackId = null;

function playAudio(url, title, producer, trackId = null, cover = null) {
    if (!url) {
        showToast("Аудио недоступно");
        return;
    }

    currentTrackId = trackId;

    if (currentAudio) {
        currentAudio.pause();
    }

    currentAudio = new Audio(url);
    const playBtn = document.getElementById('playPauseBtn');
    const volumeSlider = document.getElementById('volumeSlider');

    if (volumeSlider) currentAudio.volume = parseFloat(volumeSlider.value);

    // Обложка (если есть)
    const coverEl = document.getElementById('playerCover');
    if (cover && cover.startsWith('data:image')) {
        coverEl.style.backgroundImage = `url(${cover})`;
        coverEl.style.backgroundSize = 'cover';
    } else {
        coverEl.style.backgroundImage = '';
        coverEl.style.background = 'var(--gradient-1)';
    }

    // Прогресс и время
    currentAudio.addEventListener('timeupdate', () => {
        if (!currentAudio.duration) return;
        const percent = (currentAudio.currentTime / currentAudio.duration) * 100;
        document.getElementById('progressFill').style.width = percent + '%';
        
        document.getElementById('currentTime').textContent = formatTime(currentAudio.currentTime);
        document.getElementById('durationTime').textContent = formatTime(currentAudio.duration);
    });

    currentAudio.addEventListener('ended', () => {
        playBtn.innerHTML = '<i class="fas fa-play"></i>';
        isPlaying = false;
    });

    currentAudio.play().then(() => {
        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        isPlaying = true;

        document.getElementById('currentTrackTitle').textContent = title;
        document.getElementById('currentTrackProducer').innerHTML = 
            `<span onclick="viewProducerProfile('${escapeHtml(producer).replace(/'/g, "\\'")}')">${escapeHtml(producer)}</span>`;

        document.getElementById('audioPlayer').classList.add('active');
        
        updatePlayerButtons();
    }).catch(err => {
        console.error(err);
        showToast("Ошибка воспроизведения");
    });

function formatTime(seconds) {
    if (!seconds || isNaN(seconds)) return "0:00";
    const min = Math.floor(seconds / 60);
    const sec = Math.floor(seconds % 60);
    return `${min}:${sec < 10 ? '0' : ''}${sec}`;
}

    function incrementPlays(producerName, trackTitle) {
    if (!producerName) return;

    // Увеличиваем у автора трека
    let users = JSON.parse(localStorage.getItem('beatwave_users') || '[]');
    const authorIndex = users.findIndex(u => u.nickname === producerName);
    
    if (authorIndex !== -1) {
        users[authorIndex].plays = (users[authorIndex].plays || 0) + 1;
        localStorage.setItem('beatwave_users', JSON.stringify(users));
    }

    // Увеличиваем счётчик у самого бита
    const beat = beatsCatalog.find(b => b.producer === producerName && b.title === trackTitle);
    if (beat) {
        beat.plays = (beat.plays || 0) + 1;
    }

    saveAll();
    refreshAllUI();
    
    // Увеличиваем у текущего пользователя (если он слушает чужой трек)
    if (currentUser && currentUser.nickname !== producerName) {
        currentUser.plays = (currentUser.plays || 0) + 1;
    }
}
    // Инициализация плеера
function initAudioPlayer() {
    const playBtn = document.getElementById('playPauseBtn');
    const closeBtn = document.getElementById('closePlayerBtn');
    const progressBar = document.getElementById('progressBar');
    const volumeSlider = document.getElementById('volumeSlider');

    // Play / Pause
    if (playBtn) {
        playBtn.addEventListener('click', () => {
            if (!currentAudio) return;
            if (isPlaying) {
                currentAudio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                isPlaying = false;
            } else {
                currentAudio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                isPlaying = true;
            }
        });
    }

    // Close Player (остановка и скрытие)
    if (closeBtn) {
        closeBtn.addEventListener('click', () => {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            isPlaying = false;
            const audioPlayer = document.getElementById('audioPlayer');
            if (audioPlayer) audioPlayer.classList.remove('active');
            if (playBtn) playBtn.innerHTML = '<i class="fas fa-play"></i>';
            const fill = document.getElementById('progressFill');
            if (fill) fill.style.width = '0%';
            currentTrackId = null;
            currentTrackAuthorId = null;
            currentTrackCover = null;
        });
    }

    // Прогресс-бар
    if (progressBar) {
        progressBar.addEventListener('click', (e) => {
            if (!currentAudio || !currentAudio.duration) return;
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            currentAudio.currentTime = percent * currentAudio.duration;
        });
    }

    // Громкость
    if (volumeSlider) {
        volumeSlider.addEventListener('input', () => {
            if (currentAudio) currentAudio.volume = parseFloat(volumeSlider.value);
        });
    }

    // Избранное
    const favBtn = document.getElementById('playerFavoriteBtn');
    if (favBtn) {
        favBtn.addEventListener('click', () => {
            if (!currentTrackId || !currentUser) {
                showToast("Войдите в профиль, чтобы добавить в избранное");
                return;
            }
            
            const currentBeat = beatsCatalog.find(b => b.id == currentTrackId);
            if (currentBeat && currentBeat.authorId === currentUser.id) {
                showToast("❌ Нельзя добавить свой бит в избранное");
                return;
            }
            
            const idStr = currentTrackId.toString();
            
            if (favorites.includes(idStr)) {
                favorites = favorites.filter(f => f !== idStr);
                showToast("Удалено из избранного");
            } else {
                favorites.push(idStr);
                showToast("✅ Добавлено в избранное");
            }
            saveAll();
            refreshFavorites();
            updatePlayerButtons();
            renderMarket();
        });
    }

    // Корзина
    const cartBtn = document.getElementById('playerCartBtn');
    if (cartBtn) {
        cartBtn.addEventListener('click', () => {
            if (!currentTrackId || !currentUser) {
                showToast("Войдите в профиль, чтобы добавить в корзину");
                return;
            }
            
            const beat = beatsCatalog.find(b => b.id == currentTrackId);
            if (!beat) return;
            
            if (currentUser.id === beat.authorId) {
                showToast("❌ Нельзя купить свой бит");
                return;
            }
            
            addToCart({
                id: beat.id,
                title: beat.title,
                price: beat.price,
                producer: beat.producer
            });
        });
    }
}

    function getPopularBeats() { return [...beatsCatalog].sort((a,b) => (b.plays||0) - (a.plays||0)).slice(0, 6); }
    function getPopularProducers() {
    const producerPlays = {};
    
    beatsCatalog.forEach(beat => {
        const name = beat.producer;
        if (name) {
            producerPlays[name] = (producerPlays[name] || 0) + (beat.plays || 0);
        }
    });

    return Object.entries(producerPlays)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 6)
        .map(([name, plays]) => ({ name, plays }));
}

function viewProducerProfile(producerName) {

    let producerServices = [];

let users = JSON.parse(localStorage.getItem('beatwave_users') || '[]');

if (!foundUser && currentUser && currentUser.nickname === producerName) {

    if (!users.some(u => u.id === currentUser.id)) {
        users.push(currentUser);
        localStorage.setItem('beatwave_users', JSON.stringify(users));
    }
}
    if (foundUser) {

            isSubscribed = currentUser.subscriptions.includes(producerData.id);

        producerBeats = beatsCatalog.filter(b => b.producer === producerName);
        producerKits = kitsCatalog.filter(k => k.producer === producerName);
        producerServices = servicesCatalog.filter(s => s.producer === producerName);
    }

    if (producerBeats.length === 0 && producerKits.length === 0 && producerServices.length === 0) {
        showToast("Битмейкер не найден");
        return;
    }

    const name = producerData?.nickname || producerName;
    const bio = producerData?.bio || "Битмейкер на BeatWave";
    const email = producerData?.email || "";
    const telegram = producerData?.telegram || "";
    const avatar = producerData?.avatar || null;
    
    // Статистика
    const totalPlays = [...producerBeats, ...producerKits, ...producerServices].reduce((sum, item) => sum + (item.plays || 0), 0);
    const totalItems = producerBeats.length + producerKits.length + producerServices.length;
    const totalFollowers = producerData?.followers || 0;
    
    // Количество лайков (добавлений в избранное) у товаров битмейкера
    const totalLikes = [...producerBeats, ...producerKits, ...producerServices].filter(item => favorites.includes(item.id.toString())).length;

function addToCart(item) {
    if (!currentUser) {
        showToast("Войдите в профиль, чтобы добавить товар в корзину");
        return;
    }
    
    // Проверка: нельзя добавить свой товар
    const beat = beatsCatalog.find(b => b.id == item.id);
    if (beat && beat.authorId === currentUser?.id) {
        showToast("❌ Нельзя купить свой товар");
        return;
    }
    
    item.id = item.id.toString();
    
    const existing = cart.find(i => i.id === item.id);
    if (existing) {
        showToast(`✅ ${item.title} уже в корзине`);
        return;
    }
    
    cart.push({ 
        id: item.id, 
        title: item.title, 
        price: parseFloat(item.price),
        producer: item.producer || "BeatWave"
    });
    
    saveAll();  // Сохраняем вместе с корзиной пользователя
    updateCartUI();
    showToast(`✅ ${item.title} добавлен в корзину`);
}

function removeFromCart(id) {
    id = id.toString();
    cart = cart.filter(i => i.id !== id);
    saveAll();  // Сохраняем изменения
    updateCartUI();
    renderCartModal();
    showToast("Товар удалён из корзины");
}

    function renderProfileItems(section, search) {
    const container = document.getElementById('profileItemsContainer');
    
    // === РАЗДЕЛ ПОДПИСЧИКИ ===
    if(section === 'subscribers') {
        const users = JSON.parse(localStorage.getItem('beatwave_users') || '[]');
        let subscribers = users.filter(u => u.subscriptions && u.subscriptions.includes(currentUser.id));
        
        if(search) {
            const q = search.toLowerCase();
            subscribers = subscribers.filter(sub => sub.nickname.toLowerCase().includes(q));
        }
        
        if(subscribers.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:60px;color:var(--tg-hint);">У вас пока нет подписчиков</div>';
            return;
        }
        
        container.innerHTML = `<div class="beats-grid">${subscribers.map(sub => `
            <div class="beat-card" style="cursor: pointer;" onclick="viewProducerProfile('${escapeHtml(sub.nickname).replace(/'/g, "\\'")}')">

                    <div class="play-overlay">
                        <div class="play-btn" style="background: rgba(0,0,0,0.7);"><i class="fas fa-user"></i></div>

                    <div class="action-buttons">
                        <button class="buy-btn" onclick="event.stopPropagation(); viewProducerProfile('${escapeHtml(sub.nickname).replace(/'/g, "\\'")}')" style="background: var(--gradient-1); padding: 8px 16px;">Перейти в профиль</button>

    }
    
    // === РАЗДЕЛЫ БИТЫ, КИТЫ, УСЛУГИ ===
    let items = [];

    else if(section === 'kits') items = kitsCatalog.filter(k => k.authorId === currentUser.id);
    else items = servicesCatalog.filter(s => s.authorId === currentUser.id);

        let draw=false;

        const end=()=>{ draw=false; save(); };
        const getPos=(e)=>{ const rect=canvas.getBoundingClientRect(); const scaleX=canvas.width/rect.width; const scaleY=canvas.height/rect.height; let cx,cy; if(e.touches){ cx=e.touches[0].clientX; cy=e.touches[0].clientY; }else{ cx=e.clientX; cy=e.clientY; } return { x:(cx-rect.left)*scaleX, y:(cy-rect.top)*scaleY }; };
        canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); canvas.addEventListener('mouseup',end); canvas.addEventListener('touchstart',start); canvas.addEventListener('touchmove',move); canvas.addEventListener('touchend',end);
        window.clearRegSig = () => { regCtx.fillStyle='white'; regCtx.fillRect(0,0,regWidth,regHeight); regHistory=[]; save(); };

    // Проверка email
    if (newEmail && !isValidEmail(newEmail)) {
        showToast("Введите корректный email (пример: name@domain.ru)");
        return;
    }
    
    // Проверка Telegram username (если заполнен)
    if (newTelegram) {
        if (!isValidTelegramUsername(newTelegram)) {
            showToast("Telegram username должен начинаться с @ и содержать только латиницу, цифры и _ (например: @username)");
            return;
        }
        if (newTelegram.length < 3) {
            showToast("Telegram username должен быть не менее 3 символов (включая @)");
            return;
        }
    }
    
    // Проверяем, не занят ли новый email (если он изменился)
    if (newEmail !== currentUser.email) {
        let users = JSON.parse(localStorage.getItem('beatwave_users') || '[]');
        if (users.some(u => u.email === newEmail && u.id !== currentUser.id)) {
            showToast("❌ Этот email уже используется другим пользователем");
            return;
        }
    }
    
    // Проверяем, не занят ли новый никнейм (если он изменился)
    if (newNickname !== oldNickname) {
        let users = JSON.parse(localStorage.getItem('beatwave_users') || '[]');
        if (users.some(u => u.nickname === newNickname && u.id !== currentUser.id)) {
            showToast("❌ Этот никнейм уже используется другим пользователем");
            return;
        }
    }
    
    // Сохраняем изменения
    currentUser.nickname = newNickname;
    currentUser.email = newEmail;
    currentUser.telegram = newTelegram;
    currentUser.bio = newBio;
    currentUser.socials = newSocials;

    // Обновляем никнейм в товарах
    if (oldNickname !== newNickname) {
        beatsCatalog.forEach(b => { if(b.authorId === currentUser.id) b.producer = newNickname; });

    // Инициализация пользователя при загрузке
function initUser() {
    isRegistered = localStorage.getItem('beatwave_registered') === 'true';
    
    if (isRegistered) {
        const savedUser = localStorage.getItem('beatwave_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            
            // Загружаем избранное и корзину пользователя
            if (currentUser.favorites && Array.isArray(currentUser.favorites)) {
                favorites = [...currentUser.favorites];
            } else {
                favorites = [];
                currentUser.favorites = [];
            }
            
            if (currentUser.cart && Array.isArray(currentUser.cart)) {
                cart = [...currentUser.cart];
            } else {
                cart = [];
                currentUser.cart = [];
            }
            
            // Дополнительно синхронизируем с общим списком пользователей
            let users = JSON.parse(localStorage.getItem('beatwave_users') || '[]');
            const userFromList = users.find(u => u.id === currentUser.id);
            if (userFromList) {
                if (userFromList.favorites) favorites = [...userFromList.favorites];
                if (userFromList.cart) cart = [...userFromList.cart];
                if (userFromList.avatar) currentUser.avatar = userFromList.avatar;
                currentUser.favorites = favorites;
                currentUser.cart = cart;
                localStorage.setItem('beatwave_user', JSON.stringify(currentUser));
            }
        } else {
            isRegistered = false;
        }
    }
    
    if (!currentUser) {
        currentUser = null;
        isRegistered = false;
        favorites = [];
        cart = [];
    }
    
    if (currentUser && !currentUser.subscriptions) currentUser.subscriptions = [];
    if (currentUser && !currentUser.favorites) currentUser.favorites = [];
    if (currentUser && !currentUser.cart) currentUser.cart = [];
    
    // Сохраняем актуальные данные
    if (currentUser) {
        saveAll();
    }
}
