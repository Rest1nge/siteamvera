        .cart-btn { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 40px; display: flex; align-items: center; gap: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s; color: var(--tg-text); }

        .popular-grid::-webkit-scrollbar {display: none;                   /* Chrome, Safari, Opera */}
        .popular-beat-card, .popular-producer-card { background: var(--card-bg); border-radius: 20px; padding: 12px 20px; min-width: 180px; display: flex; align-items: center; gap: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: all 0.3s; }
        .popular-beat-card:hover, .popular-producer-card:hover { transform: translateY(-2px); border-color: rgba(124,58,237,0.3); }
        .popular-beat-cover { width: 50px; height: 50px; border-radius: 12px; background: var(--gradient-1); background-size: cover; }

        .beat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: rgba(124,58,237,0.3); }

        .beat-info { padding: 20px; }

        .beat-tags { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }

        .action-buttons { display: flex; gap: 12px; margin-top: 12px; }
        .price { font-size: 1.5rem; font-weight: 800; background: var(--gradient-2); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .add-to-cart, .favorite-btn, .buy-btn { border: none; padding: 10px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .add-to-cart, .buy-btn { background: var(--gradient-1); color: white; }
        .favorite-btn { background: rgba(255,255,255,0.1); color: var(--tg-text); }
        .favorite-btn.active { background: #f5576c; color: white; }
        .profile-header { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 32px; padding: 32px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .profile-avatar-large { width: 120px; height: 120px; border-radius: 50%; background: var(--gradient-1); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 3rem; overflow: hidden; cursor: pointer; }
        .profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        .profile-username { text-align: center; font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; }

        .stat-item { text-align: center; }

        .stat-label { font-size: 0.8rem; color: var(--tg-hint); }
        .edit-profile-btn { display: block; width: fit-content; margin: 0 auto 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 10px 28px; border-radius: 40px; color: var(--tg-text); font-weight: 600; cursor: pointer; }
        .profile-bio { text-align: center; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 20px; color: var(--tg-hint); line-height: 1.6; }
        .profile-sections { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
        .section-tab { flex: 1; padding: 14px 20px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 60px; cursor: pointer; text-align: center; font-weight: 700; color: var(--tg-hint); transition: all 0.3s; }
        .section-tab.active { background: var(--gradient-1); color: white; box-shadow: var(--glow); }
        .section-tab span { font-size: 0.85rem; margin-left: 8px; }
        .items-list { display: flex; flex-direction: column; gap: 16px; }
        .item-row { background: var(--card-bg); border-radius: 20px; padding: 16px; display: flex; align-items: center; gap: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .item-cover-small { width: 60px; height: 60px; border-radius: 16px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--gradient-1); }
        .item-cover-small img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
        .item-info { flex: 1; }
        .item-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
        .item-price { font-size: 0.9rem; font-weight: 600; color: #a78bfa; }
        .item-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
        .item-actions { display: flex; gap: 8px; }

        .upload-form { background: var(--card-bg); border-radius: 32px; padding: 32px; max-width: 600px; margin: 0 auto; }

        .form-group input, .form-group select { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: var(--tg-text); font-size: 1rem; }
        .form-group select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 20px; }
        .form-group textarea { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: var(--tg-text); font-size: 1rem; resize: vertical; min-height: 80px; }

        .button-group { display: flex; gap: 12px; margin-top: 20px; }
        .cancel-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 14px; border-radius: 40px; color: var(--tg-text); font-weight: 600; cursor: pointer; flex: 1; }
        .delete-btn { background: rgba(245,87,108,0.2); border: 1px solid #f5576c; color: #f5576c; }
        .registration-card { background: var(--card-bg); border-radius: 32px; padding: 32px; border: 1px solid rgba(255,255,255,0.1); }
        .signature-area { border: 2px dashed rgba(255,255,255,0.2); border-radius: 20px; padding: 16px; margin-top: 8px; }
        .signature-canvas-container { background: white; border-radius: 12px; margin-bottom: 12px; }
        canvas.signature-canvas { display: block; width: 100%; height: 150px; background: white; border-radius: 12px; cursor: crosshair; touch-action: none; }
        .signature-buttons { display: flex; gap: 12px; justify-content: center; }
        .signature-buttons button { background: rgba(255,255,255,0.1); border: none; padding: 8px 16px; border-radius: 30px; color: var(--tg-text); cursor: pointer; }
        .register-submit-btn { width: 100%; background: var(--gradient-1); border: none; padding: 16px; border-radius: 60px; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 20px; }
        .audio-player { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); padding: 12px 24px; z-index: 100; transform: translateY(100%); transition: transform 0.3s; }
        .audio-player.active { transform: translateY(0); }
        .player-content { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

        .player-controls { display: flex; gap: 16px; }
        .player-controls button { background: none; border: none; color: var(--tg-text); font-size: 1.2rem; cursor: pointer; }
        .progress-bar { flex: 2; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; cursor: pointer; }
        .progress-fill { height: 100%; background: var(--gradient-1); border-radius: 2px; width: 0%; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 1000; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: all 0.3s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }

        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); padding: 12px 24px; border-radius: 60px; z-index: 1100; transition: all 0.3s; white-space: nowrap; font-weight: 500; }
        .beat-producer span {cursor: pointer;text-decoration: underline;text-decoration-thickness: 1px;text-underline-offset: 3px;transition: opacity 0.2s;}
        .beat-producer span:hover {opacity: 0.7;}
        .popular-beat-info p {cursor: pointer;text-decoration: underline;text-decoration-thickness: 1px;transition: opacity 0.2s;}
        .popular-beat-info p:hover {opacity: 0.7;}
        .popular-producer-card {cursor: pointer;}
        .subscribe-btn {background: var(--gradient-1);border: none;padding: 8px 20px;border-radius: 40px;color: white;font-weight: 600;cursor: pointer;transition: all 0.3s;margin: 0 auto 16px;display: inline-block;}
        .subscribe-btn.subscribed {background: rgba(255,255,255,0.1);border: 1px solid var(--tg-hint);color: var(--tg-text);}
        /* Глобальное скрытие скроллбаров */
        /* ====================== СКРЫТИЕ СКРОЛЛБАРОВ И ЛИФТА ====================== */
        ::-webkit-scrollbar {width: 0 !important;height: 0 !important;display: none !important;}
        ::-webkit-scrollbar-thumb {display: none !important;}
        * {scrollbar-width: none !important;-ms-overflow-style: none !important;}
        /* Скрытие стрелочек у input type="number" */
        input[type="number"] {appearance: textfield !important;-moz-appearance: textfield !important;-webkit-appearance: none !important;}

        input[type="number"]::-webkit-inner-spin-button {-webkit-appearance: none !important;margin: 0 !important;display: none !important;}

        .modal-content,
        .app-container,
        .popular-grid,
        .beats-grid,
        .items-list,
        #favoritesGrid,
        #profileItemsContainer,
        #producerItemsList,
        .upload-form {scrollbar-width: none !important;-ms-overflow-style: none !important;}
        .modal-content::-webkit-scrollbar,
        .popular-grid::-webkit-scrollbar,
        .beats-grid::-webkit-scrollbar {display: none !important;} 
        /* Красивая сетка тональностей */
        .key-grid {display: grid;grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));gap: 8px;margin-top: 8px}
        .key-item {padding: 12px 8px;background: rgba(255,255,255,0.05);border: 1px solid rgba(255,255,255,0.1);border-radius: 16px;text-align: center;font-weight: 600;font-size: 0.95rem;cursor: pointer;transition: all 0.2s;user-select: none}

<div class="app-container">
    <div class="nav-tabs">

        <div class="beats-grid" id="beatsGrid"></div>
    </div>

    <div id="uploadPage" class="page"><div id="uploadFormContainer"></div></div>
    <div id="favoritesPage" class="page"><h2 style="margin-bottom: 24px;"><i class="fas fa-heart"></i> Избранное</h2><div class="search-bar"><i class="fas fa-search search-icon"></i><input type="text" class="search-input" id="favSearchInput" placeholder="Поиск в избранном..."></div><div id="favoritesGrid"></div></div>

</div>

<div id="cartModal" class="modal-overlay"><div class="modal-content"><h2>🛒 Корзина</h2><div id="cartItemsList"></div><div id="cartTotal" style="font-size:1.3rem; margin:20px 0;"></div><button id="checkoutBtn" class="submit-beat-btn" style="margin-top:0;">Оформить</button><button id="closeCartModal" class="cancel-btn" style="margin-top:12px;">Закрыть</button></div></div>
<div id="editProfileModal" class="modal-overlay"><div class="modal-content"><h2>✏️ Редактировать профиль</h2><div class="form-group"><label>Никнейм</label><input type="text" id="editName"></div><div class="form-group"><label>E-mail</label><input type="email" id="editEmail"></div><div class="form-group"><label>Telegram username</label><input type="text" id="editTelegram" placeholder="@username"></div><div class="form-group"><label>О себе</label><textarea id="editBio" rows="3"></textarea></div><div class="form-group"><label>Соцсети</label><input type="text" id="editSocials" placeholder="https://..."></div><div class="form-group"><label>Подпись</label><div class="signature-area"><div class="signature-canvas-container"><canvas id="editSignatureCanvas" width="400" height="150"></canvas></div><div class="signature-buttons"><button id="clearEditSignature">Очистить</button><button id="undoEditSignature">Отменить</button></div></div></div><div class="button-group"><button id="saveProfileChangesBtn" class="submit-beat-btn">Сохранить</button><button id="closeEditProfileModal" class="cancel-btn">Отмена</button></div></div></div>
<div id="editItemModal" class="modal-overlay"><div class="modal-content" id="editItemModalContent"></div></div>
<div id="toast" class="toast" style="opacity:0; visibility:hidden;"></div>

<script>
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.expand(); tg.ready(); }

    let isRegistered = localStorage.getItem('beatwave_registered') === 'true';
    let currentUser = null;
    
    const keyOptions = ["C", "C#/Db", "D", "D#/Eb", "E", "F", "F#/Gb", "G", "G#/Ab", "A", "A#/Bb", "B", "Cm", "C#m", "Dm", "D#m", "Em", "Fm", "F#m", "Gm", "G#m", "Am", "A#m", "Bm"];
    
    let beatsCatalog = JSON.parse(localStorage.getItem('beatwave_catalog') || JSON.stringify([
        { id: 1, title: "Midnight Vibe", producer: "LXRY BEATS", tags: "trap, dark", bpm: 140, key: "A Minor", price: 2990, cover: null, audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", plays: 245, type: "beat", authorId: 1 },
        { id: 2, title: "Sunset Melody", producer: "SoulProd", tags: "lofi, chill", bpm: 85, key: "C Major", price: 2490, cover: null, audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", plays: 189, type: "beat", authorId: 2 },
        { id: 3, title: "Rage Mode", producer: "BassKick", tags: "trap, aggressive", bpm: 150, key: "D# Minor", price: 3490, cover: null, audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", plays: 312, type: "beat", authorId: 3 }
    ]));
    let kitsCatalog = JSON.parse(localStorage.getItem('beatwave_kits') || '[]');
    let servicesCatalog = JSON.parse(localStorage.getItem('beatwave_services') || '[]');
    let cart = JSON.parse(localStorage.getItem('beatwave_cart') || '[]');
    let favorites = JSON.parse(localStorage.getItem('beatwave_favorites') || '[]');
    let currentMainType = "beats";
    let currentUploadType = "beat";
    let currentProfileSection = "beats";
    let currentAudio = null, isPlaying = false;
    let searchQuery = "";
    let favSearchQuery = "";

    function saveAll() {
    // Сохраняем каталоги
    localStorage.setItem('beatwave_catalog', JSON.stringify(beatsCatalog));
    localStorage.setItem('beatwave_kits', JSON.stringify(kitsCatalog));
    localStorage.setItem('beatwave_services', JSON.stringify(servicesCatalog));

    if (currentUser) {
        currentUser.favorites = favorites;
        currentUser.cart = cart;

        // === СИНХРОНИЗАЦИЯ С ОБЩИМ СПИСКОМ ПОЛЬЗОВАТЕЛЕЙ ===
        let users = JSON.parse(localStorage.getItem('beatwave_users') || '[]');
        const userIndex = users.findIndex(u => u.id === currentUser.id);
        
        if (userIndex !== -1) {
            users[userIndex] = { ...currentUser }; // обновляем все данные
        } else {
            users.push(currentUser);
        }
        
        localStorage.setItem('beatwave_users', JSON.stringify(users));
        localStorage.setItem('beatwave_user', JSON.stringify(currentUser));
        localStorage.setItem('beatwave_registered', 'true');
    }
}


    // ==================== ПОЛНАЯ СИНХРОНИЗАЦИЯ UI ====================
    function refreshAllUI() {
        renderMarket();
        renderPopularBeats();
        renderPopularProducers();
        renderFavorites();
        renderProfilePage();

        // Обновляем открытый профиль продюсера
        const producerModal = document.getElementById('producerModal');
        if (producerModal && producerModal.classList.contains('active')) {
            const usernameEl = producerModal.querySelector('.profile-username');
            if (usernameEl) {
                const currentName = usernameEl.textContent.trim();
                setTimeout(() => {
                    viewProducerProfile(currentName);
                }, 80);
            }
        }
    }

    function showToast(msg, duration=2500) { const t=document.getElementById('toast'); t.textContent=msg; t.style.opacity='1'; t.style.visibility='visible'; setTimeout(()=>{ t.style.opacity='0'; t.style.visibility='hidden'; }, duration); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]); }
    function formatPrice(price) { return new Intl.NumberFormat('ru-RU').format(price) + ' ₽'; }

    function playAudio(url, title, producer) {
    if(!url) { showToast("Аудио недоступно"); return; }
    
    if(currentAudio) currentAudio.pause();
    
    currentAudio = new Audio(url);
    const playBtn = document.getElementById('playPauseBtn'), fill = document.getElementById('progressFill');

    currentAudio.addEventListener('timeupdate', () => { 
        if(currentAudio?.duration) fill.style.width = `${(currentAudio.currentTime/currentAudio.duration)*100}%`; 
    });
    
    currentAudio.addEventListener('ended', () => { 
        playBtn.innerHTML = '<i class="fas fa-play"></i>'; 
        isPlaying = false; 
        fill.style.width = '0%'; 
    });

    currentAudio.play().then(() => {
        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        isPlaying = true;
        document.getElementById('currentTrackTitle').innerText = title;
        document.getElementById('currentTrackProducer').innerText = producer;
        document.getElementById('audioPlayer').classList.add('active');

        // Реальный подсчёт прослушиваний
        incrementPlays(producer, title);
    });
}
    function incrementPlays(producerName, trackTitle) {
    if (!producerName) return;

    // Увеличиваем у текущего пользователя
    if (currentUser) {
        currentUser.plays = (currentUser.plays || 0) + 1;
    }

    // Увеличиваем у автора трека
    let users = JSON.parse(localStorage.getItem('beatwave_users') || '[]');
    const authorIndex = users.findIndex(u => u.nickname === producerName);
    
    if (authorIndex !== -1) {
        users[authorIndex].plays = (users[authorIndex].plays || 0) + 1;
        localStorage.setItem('beatwave_users', JSON.stringify(users));
    }

    // Увеличиваем счётчик у самого бита
    const beat = beatsCatalog.find(b => b.producer === producerName && b.title === trackTitle);
    if (beat) {
        beat.plays = (beat.plays || 0) + 1;
    }

    saveAll();
    refreshAllUI();   // обновляем статистику везде
}
    function initAudioPlayer() {
        const playBtn = document.getElementById('playPauseBtn'), stopBtn = document.getElementById('stopBtn'), prog = document.getElementById('progressBar'), fill = document.getElementById('progressFill');
        playBtn.onclick = () => { if(!currentAudio) return; if(isPlaying) { currentAudio.pause(); playBtn.innerHTML = '<i class="fas fa-play"></i>'; isPlaying = false; } else { currentAudio.play(); playBtn.innerHTML = '<i class="fas fa-pause"></i>'; isPlaying = true; } };
        stopBtn.onclick = () => { if(currentAudio){ currentAudio.pause(); currentAudio.currentTime = 0; playBtn.innerHTML = '<i class="fas fa-play"></i>'; isPlaying = false; fill.style.width = '0%'; } };
        prog.onclick = (e) => { if(!currentAudio) return; const rect = prog.getBoundingClientRect(); const percent = (e.clientX - rect.left) / rect.width; currentAudio.currentTime = percent * currentAudio.duration; };
    }

    function getPopularBeats() { return [...beatsCatalog].sort((a,b) => (b.plays||0) - (a.plays||0)).slice(0, 6); }
    function getPopularProducers() {
    const producerPlays = {};
    
    beatsCatalog.forEach(beat => {
        const name = beat.producer;
        if (name) {
            producerPlays[name] = (producerPlays[name] || 0) + (beat.plays || 0);
        }
    });

    return Object.entries(producerPlays)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 6)
        .map(([name, plays]) => ({ name, plays }));
}
    function renderPopularBeats() {
    const container = document.getElementById('popularBeatsGrid');
    const popular = getPopularBeats();
    if(popular.length === 0){ container.innerHTML = '<div style="color:var(--tg-hint);">Нет данных</div>'; return; }
    container.innerHTML = popular.map(beat => `
        <div class="popular-beat-card" onclick="playAudio('${beat.audioUrl}','${escapeHtml(beat.title)}','${escapeHtml(beat.producer)}')">
            <div class="popular-beat-cover ${!beat.cover?'default':''}" style="${beat.cover?`background-image:url(${beat.cover})`:''}"></div>
            <div class="popular-beat-info">
                <h4>${escapeHtml(beat.title)}</h4>
                <p style="cursor: pointer; text-decoration: underline;" onclick="event.stopPropagation(); viewProducerProfile('${escapeHtml(beat.producer).replace(/'/g, "\\'")}')">${escapeHtml(beat.producer)}</p>
                <p style="font-size:0.65rem;">🎧 ${beat.plays||0}</p>
            </div>
        </div>
    `).join('');
}
function renderPopularProducers() {
    const container = document.getElementById('popularProducersGrid');
    const popular = getPopularProducers();
    
    if (popular.length === 0) {
        container.innerHTML = '<div style="color:var(--tg-hint); padding:20px;">Нет данных</div>';
        return;
    }

    container.innerHTML = popular.map(prod => {
        // Ищем данные пользователя для аватарки
        const users = JSON.parse(localStorage.getItem('beatwave_users') || '[]');
        const userData = users.find(u => u.nickname === prod.name);
        const avatar = userData?.avatar || null;

        return `
            <div class="popular-producer-card" onclick="viewProducerProfile('${escapeHtml(prod.name).replace(/'/g, "\\'")}')">
                <div class="popular-producer-avatar" style="background: ${avatar ? 'transparent' : 'var(--gradient-2)'}; overflow: hidden;">
                    ${avatar 
                        ? `<img src="${avatar}" style="width:100%; height:100%; object-fit:cover;">` 
                        : '<i class="fas fa-user"></i>'}
                </div>
                <div>
                    <strong>${escapeHtml(prod.name)}</strong>
                    <p style="font-size:0.75rem; color:var(--tg-hint); margin-top:4px;">
                        🎧 ${prod.plays} прослушиваний
                    </p>
                </div>
            </div>
        `;
    }).join('');
}

    function filterItems(items, query) {
        if(!query) return items;
        const q = query.toLowerCase();
        return items.filter(item => 
            item.title.toLowerCase().includes(q) || 
            (item.producer || '').toLowerCase().includes(q) ||
            (item.tags || '').toLowerCase().includes(q) || 
            (item.bpm && item.bpm.toString().includes(q))
        );
    }

    // Объединённая и исправленная renderMarket()

function renderMarket() {

    let items = [];
    let currentType = "beat";

    if(currentMainType === 'beats') {
        items = beatsCatalog;
        currentType = "beat";
    }
    else if(currentMainType === 'kits') {
        items = kitsCatalog;
        currentType = "kit";
    }
    else {
        items = servicesCatalog;
        currentType = "service";
    }

    items = filterItems(items, searchQuery);

    const grid = document.getElementById('beatsGrid');

    if(items.length === 0){
        grid.innerHTML = `
            <div style="text-align:center;padding:60px;">
                Нет товаров
            </div>
        `;
        return;
    }

    grid.innerHTML = items.map(item => {

        // Показываем плеер только для битов
        const isBeat = currentType === 'beat';

        return `
            <div class="beat-card">
                <div class="beat-cover ${!item.cover ? 'default' : ''}"
                     style="${item.cover ? `background-image: url(${item.cover})` : ''}">
                    ${isBeat ? `
                        <div class="play-overlay">
                            <div class="play-btn"
                                 data-audio="${item.audioUrl || ''}"
                                 data-title="${escapeHtml(item.title)}"
                                 data-producer="${escapeHtml(item.producer || 'BeatWave')}">
                                <i class="fas fa-play"></i>
                            </div>
                        </div>
                    ` : ''}
                </div>
                <div class="beat-info">
                    <div class="beat-title">
                        ${escapeHtml(item.title)}
                    </div>
                    <div class="beat-producer">
    <span style="cursor: pointer; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px;" 
          onclick="viewProducerProfile('${escapeHtml(item.producer || 'BeatWave').replace(/'/g, "\\'")}')">
        ${escapeHtml(item.producer || 'BeatWave')}
        <i class="fas fa-external-link-alt" style="font-size: 0.65rem; margin-left: 4px; opacity: 0.6;"></i>
    </span>
</div>
                    <div class="beat-tags">
                        ${(item.tags || '')
                            .split(',')
                            .filter(t => t.trim())
                            .map(t => `<span class="tag">${t.trim()}</span>`)
                            .join('')}
                    </div>
                    ${
                        item.bpm
                        ? `
                            <div class="beat-tags">
                                <span class="tag">${item.bpm} BPM</span>
                                ${item.key ? `<span class="tag">${item.key}</span>` : ''}
                            </div>
                          `
                        : (
                            item.key
                            ? `
                                <div class="beat-tags">
                                    <span class="tag">${item.key}</span>
                                </div>
                              `
                            : ''
                          )
                    }
                    <div class="price">
                        ${formatPrice(item.price)}
                    </div>

                    <div class="action-buttons">
                        <button class="favorite-btn ${favorites.includes(item.id) ? 'active' : ''}"
                                data-id="${item.id}"
                                data-type="${currentType}">
                            <i class="fas fa-heart"></i>
                        </button>
                        <button class="buy-btn"
                                data-id="${item.id}"
                                data-price="${item.price}"
                                data-title="${escapeHtml(item.title)}">
                            <i class="fas fa-shopping-cart"></i>
                            Купить
                        </button>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    // PLAY
    document.querySelectorAll('.play-btn').forEach(btn => {
        if(btn.dataset.audio){
            btn.addEventListener('click', () => {
                playAudio(
                    btn.dataset.audio,
                    btn.dataset.title,
                    btn.dataset.producer
                );
            });
        }
    });

    // BUY
    
document.querySelectorAll('.buy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const card = btn.closest('.beat-card'); // находим карточку
        const producerEl = card.querySelector('.beat-producer span');
        const producer = producerEl ? producerEl.textContent.trim() : 'BeatWave';

        addToCart({
            id: btn.dataset.id,
            title: btn.dataset.title,
            price: parseFloat(btn.dataset.price),
            producer: producer
        });
    });
});

    // FAVORITES
    document.querySelectorAll('.favorite-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            let id = btn.dataset.id.toString();
            
            if(favorites.includes(id)) {
                favorites = favorites.filter(f => f !== id);
                showToast("Удалено из избранного");
            } else {
                favorites.push(id);
                showToast("Добавлено в избранное ❤️");
            }
            
            saveAll();
            refreshFavorites();        // ← Важно!
        });
    });
}

// ==================== ПРОФИЛЬ БИТМЕЙКЕРА ====================
function viewProducerProfile(producerName) {
    let producerData = null;
    let producerBeats = [];
    let producerKits = [];
    let producerServices = [];
    let isSubscribed = false;

    const users = JSON.parse(localStorage.getItem('beatwave_users') || '[]');
    const foundUser = users.find(u => u.nickname === producerName);

    if (foundUser) {
        producerData = foundUser;
        producerBeats = beatsCatalog.filter(b => b.authorId === producerData.id || b.producer === producerName);
        producerKits = kitsCatalog.filter(k => k.authorId === producerData.id);
        producerServices = servicesCatalog.filter(s => s.authorId === producerData.id);

        if (currentUser && currentUser.subscriptions) {
            isSubscribed = currentUser.subscriptions.includes(producerData.id);
        }
    } else {
        producerBeats = beatsCatalog.filter(b => b.producer === producerName);
        producerKits = kitsCatalog.filter(k => k.producer === producerName);
        producerServices = servicesCatalog.filter(s => s.producer === producerName);
    }

    if (producerBeats.length === 0 && producerKits.length === 0 && producerServices.length === 0) {
        showToast("Битмейкер не найден");
        return;
    }

    const name = producerData?.nickname || producerName;
    const bio = producerData?.bio || "Битмейкер на BeatWave";
    const avatar = producerData?.avatar || null;
    const totalPlays = [...producerBeats, ...producerKits, ...producerServices]
        .reduce((sum, item) => sum + (item.plays || 0), 0);
    const totalItems = producerBeats.length + producerKits.length + producerServices.length;
    const totalFollowers = producerData?.followers || 0;
    let modal = document.getElementById('producerModal');
    if (modal) modal.remove();

    modal = document.createElement('div');
    modal.id = 'producerModal';
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content" style="max-width: 650px; width: 90%; max-height: 85vh; overflow-y: auto;">
            <div class="profile-header" style="margin-bottom: 0;">
                <div class="profile-avatar-large" style="cursor: default; background: var(--gradient-1);">
                    ${avatar 
                        ? `<img src="${avatar}" style="width:100%; height:100%; object-fit: cover;">` 
                        : '<i class="fas fa-user" style="font-size: 3.5rem; opacity: 0.8;"></i>'}
                </div>
                <div class="profile-username">${escapeHtml(name)}</div>
                
                <div class="profile-stats">
                    <div class="stat-item"><div class="stat-number">${totalPlays}</div><div class="stat-label">прослушиваний</div></div>
                    <div class="stat-item"><div class="stat-number">${totalItems}</div><div class="stat-label">товаров</div></div>
                    <div class="stat-item"><div class="stat-number">${totalFollowers}</div><div class="stat-label">подписчиков</div></div>
                </div>

                <div style="display: flex; justify-content: center; gap: 12px; margin: 16px 0;">
                    <button class="subscribe-btn ${isSubscribed ? 'subscribed' : ''}" id="subscribeProducerBtn">
                        <i class="fas ${isSubscribed ? 'fa-check' : 'fa-user-plus'}"></i> 
                        ${isSubscribed ? 'Подписан' : 'Подписаться'}
                    </button>
                </div>

                <div class="profile-bio" style="text-align: left; line-height: 1.6; font-size: 0.95rem; padding: 18px; background: rgba(255,255,255,0.03); border-radius: 20px;">
                    ${escapeHtml(bio)}
                </div>
            </div>

            <div class="search-bar" style="margin: 24px 0 16px 0;">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="producerSearchInput" placeholder="Поиск в товарах...">
            </div>

            <div class="profile-sections" style="margin-bottom: 20px;">
                <div class="section-tab active" data-producer-section="beats">Биты <span>(${producerBeats.length})</span></div>
                <div class="section-tab" data-producer-section="kits">Киты <span>(${producerKits.length})</span></div>
                <div class="section-tab" data-producer-section="services">Услуги <span>(${producerServices.length})</span></div>
            </div>

            <div id="producerItemsList" class="items-list"></div>
            <button id="closeProducerModal" class="cancel-btn" style="margin-top: 24px; width: 100%;">Закрыть</button>
        </div>
    `;

    document.body.appendChild(modal);
    modal.classList.add('active');

    let currentProducerSection = 'beats';
    let producerSearchQuery = '';

    // === Подписка ===
    document.getElementById('subscribeProducerBtn')?.addEventListener('click', () => {
        if (!currentUser) {
            showToast("Войдите в аккаунт для подписки");
            return;
        }
        if (!producerData) {
            showToast("Нельзя подписаться на этого битмейкера");
            return;
        }

        if (!currentUser.subscriptions) currentUser.subscriptions = [];

        if (isSubscribed) {
            // Отписка
            currentUser.subscriptions = currentUser.subscriptions.filter(id => id !== producerData.id);
            if (producerData.followers !== undefined) producerData.followers = Math.max(0, (producerData.followers || 0) - 1);
            showToast(`❌ Отписались от ${name}`);
        } else {
            // Подписка
            currentUser.subscriptions.push(producerData.id);
            producerData.followers = (producerData.followers || 0) + 1;
            showToast(`✅ Вы подписались на ${name}`);
        }

        isSubscribed = !isSubscribed;
        const btn = document.getElementById('subscribeProducerBtn');
        btn.classList.toggle('subscribed');
        btn.innerHTML = `<i class="fas ${isSubscribed ? 'fa-check' : 'fa-user-plus'}"></i> ${isSubscribed ? 'Подписан' : 'Подписаться'}`;

        saveAll();
        refreshAllUI();
    });

    // Рендер товаров
    function renderProducerItems(section, search = '') {
        let items = [];
        if (section === 'beats') items = [...producerBeats];
        else if (section === 'kits') items = [...producerKits];
        else items = [...producerServices];

        if (search) {
            const q = search.toLowerCase();
            items = items.filter(item => 
                item.title.toLowerCase().includes(q) || 
                (item.tags || '').toLowerCase().includes(q)
            );
        }

        const container = document.getElementById('producerItemsList');
        if (!container) return;

        if (items.length === 0) {
            container.innerHTML = `<div style="text-align:center;padding:50px;color:var(--tg-hint);">Ничего не найдено</div>`;
            return;
        }

        container.innerHTML = items.map(item => {
            const isBeat = section === 'beats';
            const isFav = favorites.includes(item.id.toString());
            return `
                <div class="item-row">
                    <div class="item-cover-small">
                        ${item.cover ? `<img src="${item.cover}">` : `<i class="fas ${isBeat ? 'fa-music' : 'fa-drum'}"></i>`}
                    </div>
                    <div class="item-info">
                        <div class="item-title">${escapeHtml(item.title)}</div>
                        <div class="item-price">${formatPrice(item.price)}</div>
                        ${item.tags ? `<div class="item-tags">${item.tags.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('')}</div>` : ''}
                    </div>

    }
    
    if(favBeats.length === 0 && favKits.length === 0 && favServices.length === 0 && subscribedProducers.length === 0) {

                            <button class="unsubscribe-btn" data-id="${producer.id}" style="background: rgba(245,87,108,0.2); border: 1px solid #f5576c; color: #f5576c; padding: 8px 16px; border-radius: 40px; cursor: pointer;"><i class="fas fa-user-minus"></i> Отписаться</button>
                        </div>
                    </div>
                </div>
            `).join('')}</div>`;
            
            document.querySelectorAll('.unsubscribe-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();

        document.querySelectorAll('#favItemsContainer .buy-btn').forEach(btn => {

                showToast("Удалено из избранного");

    document.querySelectorAll('[data-fav-section]').forEach(tab => {

    renderFavSection('beats');

function addToCart(item) {
    item.id = item.id.toString();
    
    const existing = cart.find(i => i.id === item.id);
    if (existing) {
        showToast(`✅ ${item.title} уже в корзине`);
        return;
    }
    
    cart.push({ 
        id: item.id, 
        title: item.title, 
        price: parseFloat(item.price),
        producer: item.producer || "BeatWave"
    });
    
    saveAll();
    updateCartUI();
    showToast(`✅ ${item.title} добавлен в корзину`);
}

function removeFromCart(id) {
    id = id.toString();
    cart = cart.filter(i => i.id !== id);
    saveAll();
    updateCartUI();
    renderCartModal();
    showToast("Товар удалён из корзины");
}

function updateCartUI() {
    const countEl = document.getElementById('cartCount');
    if (countEl) {
        countEl.innerText = cart.length;
    }
}

    // Регистрация
    let regCanvas=null, regCtx=null, regHistory=[], regWidth=400, regHeight=150;
    function initRegSignature() {
        const canvas = document.getElementById('signatureCanvas');
        if(!canvas) return;
        const container = canvas.parentElement;
        regWidth = container.clientWidth || 400;
        regHeight = 150;
        canvas.width = regWidth; canvas.height = regHeight;
        canvas.style.width = '100%';
        regCtx = canvas.getContext('2d');
        regCtx.fillStyle = 'white'; regCtx.fillRect(0,0,regWidth,regHeight);
        regCtx.strokeStyle = '#000'; regCtx.lineWidth = 2;
        regHistory = [];
        const save = () => { const img = regCtx.getImageData(0,0,regWidth,regHeight); regHistory.push(img); if(regHistory.length>20) regHistory.shift(); };
        let draw=false;
        const start=(e)=>{ draw=true; const p=getPos(e); regCtx.beginPath(); regCtx.moveTo(p.x,p.y); e.preventDefault(); };
        const move=(e)=>{ if(!draw) return; const p=getPos(e); regCtx.lineTo(p.x,p.y); regCtx.stroke(); regCtx.beginPath(); regCtx.moveTo(p.x,p.y); };
        const end=()=>{ draw=false; save(); };
        const getPos=(e)=>{ const rect=canvas.getBoundingClientRect(); const scaleX=canvas.width/rect.width; const scaleY=canvas.height/rect.height; let cx,cy; if(e.touches){ cx=e.touches[0].clientX; cy=e.touches[0].clientY; }else{ cx=e.clientX; cy=e.clientY; } return { x:(cx-rect.left)*scaleX, y:(cy-rect.top)*scaleY }; };
        canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); canvas.addEventListener('mouseup',end); canvas.addEventListener('touchstart',start); canvas.addEventListener('touchmove',move); canvas.addEventListener('touchend',end);
        window.clearRegSig = () => { regCtx.fillStyle='white'; regCtx.fillRect(0,0,regWidth,regHeight); regHistory=[]; save(); };
        window.undoRegSig = () => { if(regHistory.length>1){ regHistory.pop(); regCtx.putImageData(regHistory[regHistory.length-1],0,0); } };
        document.getElementById('clearSig')?.addEventListener('click',()=>window.clearRegSig());
        document.getElementById('undoSig')?.addEventListener('click',()=>window.undoRegSig());
    }
    function isSignatureEmpty() { if(!regCtx) return true; const img=regCtx.getImageData(0,0,regWidth,regHeight); for(let i=0;i<img.data.length;i+=4) if(img.data[i]<250 || img.data[i+1]<250 || img.data[i+2]<250) return false; return true; }

        if(!canvas) return;
        const container = canvas.parentElement;
        editCanvasWidth = container.clientWidth || 400;
        editCanvasHeight = 150;
        canvas.width = editCanvasWidth; canvas.height = editCanvasHeight;
        canvas.style.width = '100%';
        editCtx = canvas.getContext('2d');
        editCtx.fillStyle = 'white'; editCtx.fillRect(0,0,editCanvasWidth,editCanvasHeight);
        editCtx.strokeStyle = '#000'; editCtx.lineWidth = 2;
        editHistory = [];
        const save = () => { const img = editCtx.getImageData(0,0,editCanvasWidth,editCanvasHeight); editHistory.push(img); if(editHistory.length>20) editHistory.shift(); };
        let draw=false;
        const start=(e)=>{ draw=true; const p=getPos(e); editCtx.beginPath(); editCtx.moveTo(p.x,p.y); e.preventDefault(); };
        const move=(e)=>{ if(!draw) return; const p=getPos(e); editCtx.lineTo(p.x,p.y); editCtx.stroke(); editCtx.beginPath(); editCtx.moveTo(p.x,p.y); };
        const end=()=>{ draw=false; save(); };
        const getPos=(e)=>{ const rect=canvas.getBoundingClientRect(); const scaleX=canvas.width/rect.width; const scaleY=canvas.height/rect.height; let cx,cy; if(e.touches){ cx=e.touches[0].clientX; cy=e.touches[0].clientY; }else{ cx=e.clientX; cy=e.clientY; } return { x:(cx-rect.left)*scaleX, y:(cy-rect.top)*scaleY }; };
        canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); canvas.addEventListener('mouseup',end); canvas.addEventListener('touchstart',start); canvas.addEventListener('touchmove',move); canvas.addEventListener('touchend',end);
        window.clearEditSig = () => { editCtx.fillStyle='white'; editCtx.fillRect(0,0,editCanvasWidth,editCanvasHeight); editHistory=[]; save(); };
        window.undoEditSig = () => { if(editHistory.length>1){ editHistory.pop(); editCtx.putImageData(editHistory[editHistory.length-1],0,0); } };
        document.getElementById('clearEditSignature')?.addEventListener('click',()=>window.clearEditSig());
        document.getElementById('undoEditSignature')?.addEventListener('click',()=>window.undoEditSig());
        if(currentUser?.signature) { const img=new Image(); img.onload=()=>editCtx.drawImage(img,0,0,editCanvasWidth,editCanvasHeight); img.src=currentUser.signature; }
    }

    document.getElementById('saveProfileChangesBtn')?.addEventListener('click', () => {
    const oldNickname = currentUser.nickname;
    const newNickname = document.getElementById('editName').value.trim();
    
    currentUser.nickname = newNickname;
    currentUser.email = document.getElementById('editEmail').value.trim();
    currentUser.telegram = document.getElementById('editTelegram').value.trim();
    currentUser.bio = document.getElementById('editBio').value.trim();
    currentUser.socials = document.getElementById('editSocials').value.trim();

    // Обновляем никнейм в товарах
    if (oldNickname !== newNickname) {
        beatsCatalog.forEach(b => { if(b.authorId === currentUser.id) b.producer = newNickname; });
        kitsCatalog.forEach(k => { if(k.authorId === currentUser.id) k.producer = newNickname; });
        servicesCatalog.forEach(s => { if(s.authorId === currentUser.id) s.producer = newNickname; });
    }
    
    // Сохранение подписи
    if (editCtx) {
        const imageData = document.getElementById('editSignatureCanvas').toDataURL();
        if (imageData && !imageData.includes('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJ')) {
            currentUser.signature = imageData;
        }
    }
    
    saveAll();
    refreshAllUI();                    // ← Полная синхронизация
    document.getElementById('editProfileModal').classList.remove('active');
    showToast("Профиль успешно обновлён");
});

    document.getElementById('closeEditProfileModal')?.addEventListener('click', () => document.getElementById('editProfileModal').classList.remove('active'));
    document.getElementById('closeCartModal')?.addEventListener('click', () => document.getElementById('cartModal').classList.remove('active'));
    document.getElementById('checkoutBtn')?.addEventListener('click', () => { if(cart.length===0) showToast("Корзина пуста"); else { showToast("Заказ оформлен!"); cart = []; saveAll(); updateCartUI(); document.getElementById('cartModal').classList.remove('active'); } });
    document.getElementById('cartBtn').onclick = () => { renderCartModal(); document.getElementById('cartModal').classList.add('active'); };
    document.querySelectorAll('.modal-overlay').forEach(overlay => overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.classList.remove('active'); }));
    
    function switchPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`${page}Page`).classList.add('active');
        document.querySelectorAll('.nav-tab').forEach(t => { t.classList.remove('active'); if(t.dataset.page === page) t.classList.add('active'); });
        if(page === 'home') { renderMarket(); renderPopularBeats(); renderPopularProducers(); }
        if(page === 'favorites') renderFavorites();
        if(page === 'profile') renderProfilePage();
        if(page === 'upload') renderUploadForm();
    }
    document.querySelectorAll('.nav-tab').forEach(tab => tab.addEventListener('click', () => switchPage(tab.dataset.page)));
    document.querySelectorAll('.main-tab').forEach(tab => tab.addEventListener('click', () => { document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); currentMainType = tab.dataset.main; searchQuery = ""; document.getElementById('searchInput').value = ""; renderMarket(); }));
    document.getElementById('searchInput')?.addEventListener('input', (e) => { searchQuery = e.target.value; renderMarket(); });
    document.getElementById('favSearchInput')?.addEventListener('input', (e) => { favSearchQuery = e.target.value; renderFavorites(); });
    



    // Инициализация пользователя при загрузке
    function initUser() {
        isRegistered = localStorage.getItem('beatwave_registered') === 'true';
        
        if (isRegistered) {
            const savedUser = localStorage.getItem('beatwave_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                
                // Восстанавливаем favorites и cart пользователя
                if (currentUser.favorites) favorites = currentUser.favorites;
                if (currentUser.cart) cart = currentUser.cart;
            } else {
                isRegistered = false;
            }
        }
        
        if (!currentUser) {
            currentUser = null;
            isRegistered = false;
        }
        
        if (currentUser && !currentUser.subscriptions) currentUser.subscriptions = [];
    }

    initUser();

    initAudioPlayer(); renderMarket(); renderPopularBeats(); renderPopularProducers(); updateCartUI(); renderProfilePage(); renderUploadForm();
    window.playAudio = playAudio;
</script>
</body>
</html>
