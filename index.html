<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>BeatWave — Музыкальная платформа | Telegram WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --tg-bg: var(--tg-theme-bg-color, #0a0a0f);
            --tg-text: var(--tg-theme-text-color, #ffffff);
            --tg-hint: var(--tg-theme-hint-color, #8e8e9a);
            --tg-button: var(--tg-theme-button-color, #7c3aed);
            --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #1c1c24);
            --card-bg: rgba(28, 28, 36, 0.8);
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.3);
            --glow: 0 0 20px rgba(124, 58, 237, 0.3);
        }
        body { background: var(--tg-bg); color: var(--tg-text); font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 20% 50%, rgba(124,58,237,0.08) 0%, transparent 50%); pointer-events: none; z-index: 0; }
        .app-container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 20px 24px 100px 24px; }
        .nav-tabs { display: flex; gap: 8px; background: rgba(28,28,36,0.6); backdrop-filter: blur(10px); padding: 8px; border-radius: 60px; margin-bottom: 32px; border: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; }
        .nav-tab { flex: 1; padding: 12px 20px; border: none; background: transparent; color: var(--tg-hint); font-weight: 600; font-size: 0.9rem; border-radius: 40px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .nav-tab i { font-size: 1.1rem; }
        .nav-tab.active { background: var(--gradient-1); color: white; box-shadow: var(--glow); }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .market-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .cart-btn { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 40px; display: flex; align-items: center; gap: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s; color: var(--tg-text); }
        .cart-count { background: #f5576c; color: white; border-radius: 30px; padding: 2px 8px; font-size: 0.75rem; }
        .filters { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 16px; margin-bottom: 32px; }
        .filter-chip { background: var(--tg-secondary-bg); padding: 10px 24px; border-radius: 40px; font-size: 0.9rem; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .filter-chip.active { background: var(--gradient-1); color: white; box-shadow: var(--glow); }
        .beats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px; }
        .beat-card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .beat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: rgba(124,58,237,0.3); }
        .beat-cover { height: 200px; background-size: cover; background-position: center; position: relative; display: flex; align-items: center; justify-content: center; }
        .beat-cover.default { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .play-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; cursor: pointer; }
        .beat-card:hover .play-overlay { opacity: 1; }
        .play-btn { width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #7c3aed; font-size: 1.5rem; cursor: pointer; transition: transform 0.2s; }
        .beat-info { padding: 20px; }
        .beat-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
        .beat-producer { font-size: 0.8rem; color: var(--tg-hint); margin-bottom: 12px; }
        .beat-tags { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .tag { background: rgba(124,58,237,0.2); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; }
        .action-buttons { display: flex; gap: 12px; margin-top: 12px; }
        .price { font-size: 1.5rem; font-weight: 800; background: var(--gradient-2); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .add-to-cart, .favorite-btn { border: none; padding: 10px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .add-to-cart { background: var(--gradient-1); color: white; }
        .favorite-btn { background: rgba(255,255,255,0.1); color: var(--tg-text); }
        .favorite-btn.active { background: #f5576c; color: white; }

        /* Стили для профиля */
        .profile-header { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 32px; padding: 32px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .profile-avatar-large { width: 120px; height: 120px; border-radius: 50%; background: var(--gradient-1); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 3rem; overflow: hidden; cursor: pointer; }
        .profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        .profile-username { text-align: center; font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; }
        .profile-stats { display: flex; justify-content: center; gap: 32px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-item { text-align: center; cursor: pointer; }
        .stat-number { font-size: 1.5rem; font-weight: 800; background: var(--gradient-2); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .stat-label { font-size: 0.8rem; color: var(--tg-hint); }
        .edit-profile-btn { display: block; width: fit-content; margin: 0 auto 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 10px 28px; border-radius: 40px; color: var(--tg-text); font-weight: 600; cursor: pointer; }
        .profile-bio { text-align: center; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 20px; color: var(--tg-hint); }
        .profile-sections { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
        .section-tab { flex: 1; padding: 14px 20px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 60px; cursor: pointer; text-align: center; font-weight: 700; color: var(--tg-hint); }
        .section-tab.active { background: var(--gradient-1); color: white; }
        .section-tab span { font-size: 0.85rem; margin-left: 8px; }
        .items-list { display: flex; flex-direction: column; gap: 16px; }
        .item-row { background: var(--card-bg); border-radius: 20px; padding: 16px; display: flex; align-items: center; gap: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .item-cover-small { width: 60px; height: 60px; border-radius: 16px; background: var(--gradient-1); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .item-info { flex: 1; }
        .item-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
        .item-price { font-size: 0.9rem; font-weight: 600; color: #a78bfa; }
        .item-actions { display: flex; gap: 8px; }
        .item-actions button { background: rgba(255,255,255,0.1); border: none; width: 36px; height: 36px; border-radius: 50%; color: var(--tg-text); cursor: pointer; transition: all 0.2s; }
        .item-play-btn { background: none; border: none; color: var(--tg-text); font-size: 1.3rem; cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Модальные окна */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 1000; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: all 0.3s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-content { background: var(--card-bg); border-radius: 32px; padding: 32px; max-width: 550px; width: 90%; max-height: 85vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: var(--tg-text); }
        .upload-area { border: 2px dashed rgba(255,255,255,0.2); border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; }
        .submit-btn { width: 100%; background: var(--gradient-1); border: none; padding: 14px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .close-modal { margin-top: 12px; background: none; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 40px; color: var(--tg-text); cursor: pointer; width: 100%; }

        .audio-player { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); padding: 12px 24px; z-index: 100; transform: translateY(100%); transition: transform 0.3s; }
        .audio-player.active { transform: translateY(0); }
        .player-content { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .player-info { flex: 1; min-width: 150px; }
        .player-controls { display: flex; gap: 16px; }
        .progress-bar { flex: 2; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; cursor: pointer; }
        .progress-fill { height: 100%; background: var(--gradient-1); border-radius: 2px; width: 0%; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); padding: 12px 24px; border-radius: 60px; z-index: 1100; transition: all 0.3s; white-space: nowrap; }
        @media (max-width: 768px) { .app-container { padding: 16px; } .nav-tab span { display: none; } .nav-tab i { font-size: 1.3rem; } .toast { white-space: normal; max-width: 90%; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="nav-tabs">
        <button class="nav-tab active" data-page="home"><i class="fas fa-home"></i><span> Главная</span></button>
        <button class="nav-tab" data-page="upload"><i class="fas fa-upload"></i><span> Загрузка</span></button>
        <button class="nav-tab" data-page="favorites"><i class="fas fa-heart"></i><span> Избранное</span></button>
        <button class="nav-tab" data-page="profile"><i class="fas fa-user"></i><span> Профиль</span></button>
    </div>

    <div id="homePage" class="page active">
        <div class="market-header"><h2><i class="fas fa-music"></i> Каталог битов</h2><button class="cart-btn" id="cartBtn"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></button></div>
        <div class="filters" id="filtersContainer"></div>
        <div class="beats-grid" id="beatsGrid"></div>
    </div>

    <div id="uploadPage" class="page">
        <div style="background: var(--card-bg); border-radius: 32px; padding: 24px; margin-bottom: 24px;">
            <div class="profile-sections" style="margin-bottom: 0;">
                <div class="section-tab active" data-upload-type="beat"><i class="fas fa-music"></i> Биты</div>
                <div class="section-tab" data-upload-type="kit"><i class="fas fa-drumstick-bite"></i> Киты</div>
                <div class="section-tab" data-upload-type="service"><i class="fas fa-hand-sparkles"></i> Услуги</div>
            </div>
        </div>
        <div id="uploadFormContainer" class="upload-form" style="background: var(--card-bg); border-radius: 32px; padding: 32px;"></div>
    </div>

    <div id="favoritesPage" class="page"><h2 style="margin-bottom: 24px;"><i class="fas fa-heart"></i> Избранное</h2><div class="beats-grid" id="favoritesGrid"></div></div>

    <div id="profilePage" class="page">
        <div class="profile-header">
            <div class="profile-avatar-large" id="profileAvatarLarge"><i class="fas fa-user"></i></div>
            <div class="profile-username" id="profileUsername"></div>
            <div class="profile-stats">
                <div class="stat-item"><div class="stat-number" id="playsCount">0</div><div class="stat-label">прослушиваний</div></div>
                <div class="stat-item"><div class="stat-number" id="likesCount">0</div><div class="stat-label">лайков</div></div>
                <div class="stat-item"><div class="stat-number" id="followersCount">0</div><div class="stat-label">подписчиков</div></div>
            </div>
            <button class="edit-profile-btn" id="openEditProfileBtn"><i class="fas fa-edit"></i> Редактировать профиль</button>
            <div class="profile-bio" id="profileBioText"></div>
        </div>
        <div class="profile-sections">
            <div class="section-tab active" data-section="beats"><i class="fas fa-music"></i> Биты <span id="beatsCountSpan">(0)</span></div>
            <div class="section-tab" data-section="kits"><i class="fas fa-drumstick-bite"></i> Киты <span id="kitsCountSpan">(0)</span></div>
            <div class="section-tab" data-section="services"><i class="fas fa-hand-sparkles"></i> Услуги <span id="servicesCountSpan">(0)</span></div>
        </div>
        <div id="profileItemsContainer" class="items-list"></div>
    </div>
</div>

<div class="audio-player" id="audioPlayer"><div class="player-content"><div class="player-info"><div id="currentTrackTitle"></div><div id="currentTrackProducer" style="font-size:0.75rem;"></div></div><div class="player-controls"><button id="playPauseBtn"><i class="fas fa-play"></i></button><button id="stopBtn"><i class="fas fa-stop"></i></button></div><div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div></div></div>
<div id="cartModal" class="modal-overlay"><div class="modal-content"><h2>🛒 Корзина</h2><div id="cartItemsList"></div><div id="cartTotal" style="font-size:1.3rem; margin:20px 0;"></div><button id="checkoutBtn" class="submit-btn">Оформить</button><button id="closeCartModal" class="close-modal">Закрыть</button></div></div>
<div id="editProfileModal" class="modal-overlay"><div class="modal-content"><h2>✏️ Редактировать профиль</h2><div class="form-group"><label>Ник</label><input type="text" id="editName" placeholder="Ваше имя"></div><div class="form-group"><label>Юзернейм в Telegram</label><input type="text" id="editTelegram" placeholder="@username"></div><div class="form-group"><label>Описание</label><textarea id="editBio" rows="3" placeholder="О себе"></textarea></div><div class="form-group"><label>Ссылки на соцсети (через запятую)</label><input type="text" id="editSocials" placeholder="https://instagram.com/..., https://soundcloud.com/..."></div><button id="saveProfileChangesBtn" class="submit-btn">Сохранить</button><button id="closeEditProfileModal" class="close-modal">Отмена</button></div></div>
<div id="editItemModal" class="modal-overlay"><div class="modal-content" id="editItemModalContent"></div></div>
<div id="toast" class="toast" style="opacity:0; visibility:hidden;"></div>

<script>
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.expand(); tg.ready(); }

    const DEMO_AUDIOS = ["https://actions.google.com/sound/bar.mp3","https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"];
    
    let beatsCatalog = JSON.parse(localStorage.getItem('beatwave_catalog') || JSON.stringify([
        { id: 1, title: "Midnight Vibe", producer: "Музыкант", genre: "trap", price: 29.99, bpm: 140, key: "A Minor", cover: null, audioUrl: DEMO_AUDIOS[1], type: "beat", authorId: 1 },
        { id: 2, title: "Sunset Melody", producer: "Музыкант", genre: "lofi", price: 24.99, bpm: 85, key: "C Major", cover: null, audioUrl: DEMO_AUDIOS[1], type: "beat", authorId: 1 }
    ]));
    
    let kitsCatalog = JSON.parse(localStorage.getItem('beatwave_kits') || JSON.stringify([
        { id: "k1", title: "808 Drum Kit", price: 19.99, description: "Набор ударных 808", cover: null, fileUrl: null, type: "kit", authorId: 1 },
        { id: "k2", title: "Melody Loops Pack", price: 24.99, description: "Мелодические лупы", cover: null, fileUrl: null, type: "kit", authorId: 1 }
    ]));
    
    let servicesCatalog = JSON.parse(localStorage.getItem('beatwave_services') || JSON.stringify([
        { id: "s1", title: "Сведение трека", price: 49.99, description: "Профессиональное сведение", type: "service", authorId: 1 },
        { id: "s2", title: "Мастеринг", price: 39.99, description: "Финальная обработка", type: "service", authorId: 1 }
    ]));

    let profileData = JSON.parse(localStorage.getItem('beatwave_profile') || JSON.stringify({
        name: "Музыкант", bio: "🎧 Продюсер из Москвы. Создаю биты для души.", telegram: "@musician", socials: "https://instagram.com/musician", plays: 1247, likes: 342, followers: 89
    }));

    let cart = JSON.parse(localStorage.getItem('beatwave_cart') || '[]');
    let favorites = JSON.parse(localStorage.getItem('beatwave_favorites') || '[]');
    let currentGenre = "all";
    let currentUploadType = "beat";
    let currentProfileSection = "beats";
    let currentAudio = null, isPlaying = false;
    let editingItem = null;

    function saveAll() { localStorage.setItem('beatwave_catalog', JSON.stringify(beatsCatalog)); localStorage.setItem('beatwave_kits', JSON.stringify(kitsCatalog)); localStorage.setItem('beatwave_services', JSON.stringify(servicesCatalog)); localStorage.setItem('beatwave_profile', JSON.stringify(profileData)); localStorage.setItem('beatwave_cart', JSON.stringify(cart)); localStorage.setItem('beatwave_favorites', JSON.stringify(favorites)); }
    function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.style.opacity='1'; t.style.visibility='visible'; setTimeout(()=>{t.style.opacity='0';t.style.visibility='hidden';},2000); }
    function isFavorite(id) { return favorites.includes(id); }
    function toggleFavorite(id) { if(favorites.includes(id)) favorites = favorites.filter(f=>f!==id); else favorites.push(id); saveAll(); renderBeats(); renderFavorites(); }
    function addToCart(item, type) { let ex=cart.find(i=>i.id===item.id && i.type===type); if(ex) ex.quantity++; else cart.push({...item, type, quantity:1}); saveAll(); updateCartUI(); showToast(`✅ ${item.title} в корзине`); }
    function removeFromCart(id, type) { cart = cart.filter(i=>!(i.id===id && i.type===type)); saveAll(); updateCartUI(); showToast("Удалено"); }
    function updateCartUI() { document.getElementById('cartCount').innerText = cart.reduce((s,i)=>s+i.quantity,0); renderCartModal(); }
    function renderCartModal() { const cont=document.getElementById('cartItemsList'); if(!cont) return; if(cart.length===0){ cont.innerHTML='<div style="text-align:center;padding:40px;">Пусто</div>'; document.getElementById('cartTotal').innerHTML='Итого: $0'; return; } let total=0; cont.innerHTML=cart.map(i=>{ total+=i.price*i.quantity; return `<div class="cart-item"><div><strong>${escapeHtml(i.title)}</strong><br><small>x${i.quantity}</small></div><div><span>$${(i.price*i.quantity).toFixed(2)}</span><button class="remove-item" data-id="${i.id}" data-type="${i.type}"><i class="fas fa-trash"></i></button></div></div>`; }).join(''); document.getElementById('cartTotal').innerHTML=`Итого: $${total.toFixed(2)}`; document.querySelectorAll('.remove-item').forEach(btn=>btn.addEventListener('click',()=>removeFromCart(btn.dataset.id, btn.dataset.type))); }
    
    function playAudio(url, title, producer) { if(currentAudio) currentAudio.pause(); currentAudio=new Audio(url); const playBtn=document.getElementById('playPauseBtn'), fill=document.getElementById('progressFill'); currentAudio.addEventListener('timeupdate',()=>{ if(currentAudio?.duration) fill.style.width=`${(currentAudio.currentTime/currentAudio.duration)*100}%`; }); currentAudio.addEventListener('ended',()=>{ playBtn.innerHTML='<i class="fas fa-play"></i>'; isPlaying=false; fill.style.width='0%'; }); currentAudio.play(); playBtn.innerHTML='<i class="fas fa-pause"></i>'; isPlaying=true; document.getElementById('currentTrackTitle').innerText=title; document.getElementById('currentTrackProducer').innerText=producer; document.getElementById('audioPlayer').classList.add('active'); }
    function initAudioPlayer() { const playBtn=document.getElementById('playPauseBtn'), stopBtn=document.getElementById('stopBtn'), prog=document.getElementById('progressBar'), fill=document.getElementById('progressFill'); playBtn.onclick=()=>{ if(!currentAudio) return; if(isPlaying){ currentAudio.pause(); playBtn.innerHTML='<i class="fas fa-play"></i>'; isPlaying=false; } else { currentAudio.play(); playBtn.innerHTML='<i class="fas fa-pause"></i>'; isPlaying=true; } }; stopBtn.onclick=()=>{ if(currentAudio){ currentAudio.pause(); currentAudio.currentTime=0; playBtn.innerHTML='<i class="fas fa-play"></i>'; isPlaying=false; fill.style.width='0%'; } }; prog.onclick=(e)=>{ if(!currentAudio) return; const rect=prog.getBoundingClientRect(); const percent=(e.clientX-rect.left)/rect.width; currentAudio.currentTime=percent*currentAudio.duration; }; }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]); }

    function renderBeats() { const grid=document.getElementById('beatsGrid'); let filtered=currentGenre==='all'?beatsCatalog:beatsCatalog.filter(b=>b.genre===currentGenre); if(filtered.length===0){ grid.innerHTML='<div style="text-align:center;padding:60px;">Нет битов</div>'; return; } grid.innerHTML=filtered.map(beat=>`<div class="beat-card"><div class="beat-cover ${!beat.cover?'default':''}" style="${beat.cover?`background-image: url(${beat.cover})`:''}"><div class="play-overlay"><div class="play-btn" data-audio="${beat.audioUrl}" data-title="${escapeHtml(beat.title)}" data-producer="${escapeHtml(beat.producer)}"><i class="fas fa-play"></i></div></div></div><div class="beat-info"><div class="beat-title">${escapeHtml(beat.title)}</div><div class="beat-producer">${escapeHtml(beat.producer)}</div><div class="beat-tags"><span class="tag">${beat.genre}</span><span class="tag">${beat.bpm} BPM</span><span class="tag">${beat.key}</span></div><div class="price">$${beat.price}</div><div class="action-buttons"><button class="favorite-btn ${isFavorite(beat.id)?'active':''}" data-id="${beat.id}"><i class="fas fa-heart"></i></button><button class="add-to-cart" data-id="${beat.id}" data-type="beat"><i class="fas fa-cart-plus"></i> Купить</button></div></div></div>`).join(''); document.querySelectorAll('.play-btn').forEach(btn=>btn.addEventListener('click',()=>playAudio(btn.dataset.audio, btn.dataset.title, btn.dataset.producer))); document.querySelectorAll('.add-to-cart').forEach(btn=>btn.addEventListener('click',()=>addToCart(beatsCatalog.find(b=>b.id==parseInt(btn.dataset.id)), 'beat'))); document.querySelectorAll('.favorite-btn').forEach(btn=>btn.addEventListener('click',()=>toggleFavorite(parseInt(btn.dataset.id)))); }
    function renderFavorites() { const grid=document.getElementById('favoritesGrid'); const fav=beatsCatalog.filter(b=>favorites.includes(b.id)); if(fav.length===0){ grid.innerHTML='<div style="text-align:center;padding:60px;">Нет избранного</div>'; return; } grid.innerHTML=fav.map(beat=>`<div class="beat-card">...</div>`).join(''); }
    function renderFilters() { const genres=['all',...new Set(beatsCatalog.map(b=>b.genre))]; document.getElementById('filtersContainer').innerHTML=genres.map(g=>`<div class="filter-chip ${currentGenre===g?'active':''}" data-genre="${g}">${g==='all'?'Все':g.toUpperCase()}</div>`).join(''); document.querySelectorAll('.filter-chip').forEach(chip=>chip.addEventListener('click',()=>{ currentGenre=chip.dataset.genre; renderFilters(); renderBeats(); })); }

    function renderProfile() {
        document.getElementById('profileUsername').innerText = profileData.name;
        document.getElementById('profileBioText').innerText = profileData.bio;
        document.getElementById('playsCount').innerText = profileData.plays;
        document.getElementById('likesCount').innerText = profileData.likes;
        document.getElementById('followersCount').innerText = profileData.followers;
        const avatarDiv = document.getElementById('profileAvatarLarge');
        if (profileData.avatar) avatarDiv.innerHTML = `<img src="${profileData.avatar}">`;
        else avatarDiv.innerHTML = '<i class="fas fa-user"></i>';
        document.getElementById('beatsCountSpan').innerText = `(${beatsCatalog.filter(b=>b.authorId===1).length})`;
        document.getElementById('kitsCountSpan').innerText = `(${kitsCatalog.filter(k=>k.authorId===1).length})`;
        document.getElementById('servicesCountSpan').innerText = `(${servicesCatalog.filter(s=>s.authorId===1).length})`;
        renderProfileSection(currentProfileSection);
    }
    function renderProfileSection(section) {
        const container = document.getElementById('profileItemsContainer');
        if (section === 'beats') {
            const items = beatsCatalog.filter(b=>b.authorId===1);
            if(items.length===0){ container.innerHTML='<div class="empty-section">Нет битов</div>'; return; }
            container.innerHTML = items.map(item=>`<div class="item-row"><div class="item-cover-small ${!item.cover?'default':''}" style="${item.cover?`background-image:url(${item.cover})`:''}"><i class="fas fa-headphones"></i></div><div class="item-info"><div class="item-title">${escapeHtml(item.title)}</div><div class="item-price">$${item.price}</div></div><div class="item-actions"><button class="item-play-btn" data-audio="${item.audioUrl}" data-title="${escapeHtml(item.title)}" data-producer="${escapeHtml(item.producer)}"><i class="fas fa-play"></i></button><button class="edit-item-btn" data-id="${item.id}" data-type="beat"><i class="fas fa-edit"></i></button><button class="delete-item-btn" data-id="${item.id}" data-type="beat"><i class="fas fa-trash"></i></button></div></div>`).join('');
        } else if (section === 'kits') {
            const items = kitsCatalog.filter(k=>k.authorId===1);
            if(items.length===0){ container.innerHTML='<div class="empty-section">Нет китов</div>'; return; }
            container.innerHTML = items.map(item=>`<div class="item-row"><div class="item-cover-small ${!item.cover?'default':''}" style="${item.cover?`background-image:url(${item.cover})`:''}"><i class="fas fa-drum"></i></div><div class="item-info"><div class="item-title">${escapeHtml(item.title)}</div><div class="item-price">$${item.price}</div><div style="font-size:0.75rem;">${escapeHtml(item.description)}</div></div><div class="item-actions"><button class="edit-item-btn" data-id="${item.id}" data-type="kit"><i class="fas fa-edit"></i></button><button class="delete-item-btn" data-id="${item.id}" data-type="kit"><i class="fas fa-trash"></i></button></div></div>`).join('');
        } else if (section === 'services') {
            const items = servicesCatalog.filter(s=>s.authorId===1);
            if(items.length===0){ container.innerHTML='<div class="empty-section">Нет услуг</div>'; return; }
            container.innerHTML = items.map(item=>`<div class="item-row"><div class="item-cover-small default"><i class="fas fa-cogs"></i></div><div class="item-info"><div class="item-title">${escapeHtml(item.title)}</div><div class="item-price">$${item.price}</div><div style="font-size:0.75rem;">${escapeHtml(item.description)}</div></div><div class="item-actions"><button class="edit-item-btn" data-id="${item.id}" data-type="service"><i class="fas fa-edit"></i></button><button class="delete-item-btn" data-id="${item.id}" data-type="service"><i class="fas fa-trash"></i></button></div></div>`).join('');
        }
        document.querySelectorAll('.item-play-btn').forEach(btn=>btn.addEventListener('click',()=>playAudio(btn.dataset.audio, btn.dataset.title, btn.dataset.producer)));
        document.querySelectorAll('.edit-item-btn').forEach(btn=>btn.addEventListener('click',()=>openEditModal(btn.dataset.id, btn.dataset.type)));
        document.querySelectorAll('.delete-item-btn').forEach(btn=>btn.addEventListener('click',()=>{ if(confirm('Удалить?')) deleteItem(btn.dataset.id, btn.dataset.type); }));
    }
    function deleteItem(id, type) {
        if(type==='beat') beatsCatalog = beatsCatalog.filter(i=>i.id!=id);
        else if(type==='kit') kitsCatalog = kitsCatalog.filter(i=>i.id!=id);
        else if(type==='service') servicesCatalog = servicesCatalog.filter(i=>i.id!=id);
        saveAll(); renderProfile(); showToast("Удалено");
    }
    function openEditModal(id, type) {
        editingItem = { id, type };
        let item, html='';
        if(type==='beat') item = beatsCatalog.find(i=>i.id==id);
        else if(type==='kit') item = kitsCatalog.find(i=>i.id==id);
        else item = servicesCatalog.find(i=>i.id==id);
        if(type==='beat') html=`<h2>✏️ Редактировать бит</h2><div class="form-group"><label>Название</label><input id="editTitle" value="${escapeHtml(item.title)}"></div><div class="form-group"><label>Жанр</label><input id="editGenre" value="${item.genre}"></div><div class="form-group"><label>Цена</label><input id="editPrice" type="number" value="${item.price}"></div><div class="form-group"><label>BPM</label><input id="editBpm" value="${item.bpm}"></div><div class="form-group"><label>Тональность</label><input id="editKey" value="${item.key}"></div><div class="form-group"><label>Обложка</label><div class="upload-area" id="editCoverArea">Нажмите для загрузки<input type="file" id="editCoverFile" accept="image/*" style="display:none"></div></div><div class="form-group"><label>Аудио</label><div class="upload-area" id="editAudioArea">Заменить аудио<input type="file" id="editAudioFile" accept="audio/*" style="display:none"></div></div><button id="saveEditBtn" class="submit-btn">Сохранить</button><button id="closeEditModal" class="close-modal">Отмена</button>`;
        else if(type==='kit') html=`<h2>✏️ Редактировать кит</h2><div class="form-group"><label>Название</label><input id="editTitle" value="${escapeHtml(item.title)}"></div><div class="form-group"><label>Цена</label><input id="editPrice" type="number" value="${item.price}"></div><div class="form-group"><label>Описание</label><textarea id="editDesc">${escapeHtml(item.description)}</textarea></div><div class="form-group"><label>Обложка</label><div class="upload-area" id="editCoverArea">Нажмите для загрузки<input type="file" id="editCoverFile" accept="image/*" style="display:none"></div></div><button id="saveEditBtn" class="submit-btn">Сохранить</button><button id="closeEditModal" class="close-modal">Отмена</button>`;
        else html=`<h2>✏️ Редактировать услугу</h2><div class="form-group"><label>Название</label><input id="editTitle" value="${escapeHtml(item.title)}"></div><div class="form-group"><label>Цена</label><input id="editPrice" type="number" value="${item.price}"></div><div class="form-group"><label>Описание</label><textarea id="editDesc">${escapeHtml(item.description)}</textarea></div><button id="saveEditBtn" class="submit-btn">Сохранить</button><button id="closeEditModal" class="close-modal">Отмена</button>`;
        document.getElementById('editItemModalContent').innerHTML = html;
        document.getElementById('editItemModal').classList.add('active');
        document.getElementById('saveEditBtn').onclick = () => saveEdit();
        document.getElementById('closeEditModal').onclick = () => document.getElementById('editItemModal').classList.remove('active');
        if(type!=='service'){
            document.getElementById('editCoverArea')?.addEventListener('click',()=>document.getElementById('editCoverFile').click());
            document.getElementById('editCoverFile')?.addEventListener('change',(e)=>{ if(e.target.files[0]){ const r=new FileReader(); r.onload=ev=>item.cover=ev.target.result; r.readAsDataURL(e.target.files[0]); showToast("Обложка обновлена"); } });
        }
        if(type==='beat'){
            document.getElementById('editAudioArea')?.addEventListener('click',()=>document.getElementById('editAudioFile').click());
            document.getElementById('editAudioFile')?.addEventListener('change',(e)=>{ if(e.target.files[0]){ const r=new FileReader(); r.onload=ev=>item.audioUrl=ev.target.result; r.readAsDataURL(e.target.files[0]); showToast("Аудио обновлено"); } });
        }
    }
    function saveEdit() {
        if(editingItem.type==='beat'){ let item=beatsCatalog.find(i=>i.id==editingItem.id); item.title=document.getElementById('editTitle').value; item.genre=document.getElementById('editGenre').value; item.price=parseFloat(document.getElementById('editPrice').value); item.bpm=parseInt(document.getElementById('editBpm').value); item.key=document.getElementById('editKey').value; }
        else if(editingItem.type==='kit'){ let item=kitsCatalog.find(i=>i.id==editingItem.id); item.title=document.getElementById('editTitle').value; item.price=parseFloat(document.getElementById('editPrice').value); item.description=document.getElementById('editDesc').value; }
        else{ let item=servicesCatalog.find(i=>i.id==editingItem.id); item.title=document.getElementById('editTitle').value; item.price=parseFloat(document.getElementById('editPrice').value); item.description=document.getElementById('editDesc').value; }
        saveAll(); renderProfile(); document.getElementById('editItemModal').classList.remove('active'); showToast("Сохранено");
    }

    function renderUploadForm() {
        const container = document.getElementById('uploadFormContainer');
        if(currentUploadType === 'beat') container.innerHTML = `<h2><i class="fas fa-cloud-upload-alt"></i> Загрузить бит</h2><div class="form-group"><label>Название</label><input id="beatTitle"></div><div class="form-group"><label>Жанр</label><select id="beatGenre"><option value="trap">Trap</option><option value="lofi">LoFi</option></select></div><div class="form-group"><label>Цена</label><input id="beatPrice" type="number"></div><div class="form-group"><label>BPM</label><input id="beatBpm" type="number"></div><div class="form-group"><label>Тональность</label><input id="beatKey"></div><div class="form-group"><label>Обложка</label><div class="upload-area" id="uploadCoverArea">Нажмите для загрузки<input type="file" id="coverFile" accept="image/*" style="display:none"></div></div><div class="form-group"><label>Аудио</label><div class="upload-area" id="uploadAudioArea">Нажмите для загрузки MP3<input type="file" id="audioFile" accept="audio/*" style="display:none"></div></div><button id="uploadSubmitBtn" class="submit-btn">Опубликовать</button>`;
        else if(currentUploadType === 'kit') container.innerHTML = `<h2><i class="fas fa-drumstick-bite"></i> Загрузить кит</h2><div class="form-group"><label>Название</label><input id="kitTitle"></div><div class="form-group"><label>Цена</label><input id="kitPrice" type="number"></div><div class="form-group"><label>Описание</label><textarea id="kitDesc" rows="3"></textarea></div><div class="form-group"><label>Обложка</label><div class="upload-area" id="uploadCoverAreaKit">Нажмите для загрузки<input type="file" id="coverFileKit" accept="image/*" style="display:none"></div></div><div class="form-group"><label>ZIP/RAR файл</label><div class="upload-area" id="uploadZipArea">Нажмите для загрузки ZIP/RAR<input type="file" id="zipFile" accept=".zip,.rar" style="display:none"></div></div><button id="uploadSubmitBtnKit" class="submit-btn">Опубликовать</button>`;
        else container.innerHTML = `<h2><i class="fas fa-hand-sparkles"></i> Добавить услугу</h2><div class="form-group"><label>Название услуги</label><input id="serviceTitle"></div><div class="form-group"><label>Цена</label><input id="servicePrice" type="number"></div><div class="form-group"><label>Описание</label><textarea id="serviceDesc" rows="3"></textarea></div><button id="uploadSubmitBtnService" class="submit-btn">Опубликовать</button>`;
        attachUploadEvents();
    }
    function attachUploadEvents() {
        if(currentUploadType === 'beat'){
            let coverData=null, audioData=null;
            document.getElementById('uploadCoverArea')?.addEventListener('click',()=>document.getElementById('coverFile').click());
            document.getElementById('uploadAudioArea')?.addEventListener('click',()=>document.getElementById('audioFile').click());
            document.getElementById('coverFile')?.addEventListener('change',(e)=>{ if(e.target.files[0]){ const r=new FileReader(); r.onload=ev=>coverData=ev.target.result; r.readAsDataURL(e.target.files[0]); showToast("Обложка загружена"); } });
            document.getElementById('audioFile')?.addEventListener('change',(e)=>{ if(e.target.files[0]){ const r=new FileReader(); r.onload=ev=>audioData=ev.target.result; r.readAsDataURL(e.target.files[0]); showToast("Аудио загружено"); } });
            document.getElementById('uploadSubmitBtn')?.addEventListener('click',()=>{ if(!audioData){ showToast("Загрузите аудио"); return; } const newId=Math.max(...beatsCatalog.map(b=>b.id),0)+1; beatsCatalog.push({id:newId, title:document.getElementById('beatTitle').value, producer:profileData.name, genre:document.getElementById('beatGenre').value, price:parseFloat(document.getElementById('beatPrice').value), bpm:parseInt(document.getElementById('beatBpm').value), key:document.getElementById('beatKey').value, cover:coverData, audioUrl:audioData, type:'beat', authorId:1}); saveAll(); renderBeats(); renderProfile(); showToast("Бит опубликован"); });
        }
        if(currentUploadType === 'kit'){
            let coverData=null, zipData=null;
            document.getElementById('uploadCoverAreaKit')?.addEventListener('click',()=>document.getElementById('coverFileKit').click());
            document.getElementById('uploadZipArea')?.addEventListener('click',()=>document.getElementById('zipFile').click());
            document.getElementById('coverFileKit')?.addEventListener('change',(e)=>{ if(e.target.files[0]){ const r=new FileReader(); r.onload=ev=>coverData=ev.target.result; r.readAsDataURL(e.target.files[0]); showToast("Обложка загружена"); } });
            document.getElementById('zipFile')?.addEventListener('change',(e)=>{ if(e.target.files[0]) showToast(`Файл ${e.target.files[0].name} выбран`); zipData=e.target.files[0]; });
            document.getElementById('uploadSubmitBtnKit')?.addEventListener('click',()=>{ if(!document.getElementById('kitTitle').value){ showToast("Введите название"); return; } const newId='k'+Date.now(); kitsCatalog.push({id:newId, title:document.getElementById('kitTitle').value, price:parseFloat(document.getElementById('kitPrice').value), description:document.getElementById('kitDesc').value, cover:coverData, fileName:zipData?.name, type:'kit', authorId:1}); saveAll(); renderProfile(); showToast("Кит опубликован"); });
        }
        if(currentUploadType === 'service'){
            document.getElementById('uploadSubmitBtnService')?.addEventListener('click',()=>{ if(!document.getElementById('serviceTitle').value){ showToast("Введите название"); return; } const newId='svc'+Date.now(); servicesCatalog.push({id:newId, title:document.getElementById('serviceTitle').value, price:parseFloat(document.getElementById('servicePrice').value), description:document.getElementById('serviceDesc').value, type:'service', authorId:1}); saveAll(); renderProfile(); showToast("Услуга добавлена"); });
        }
    }

    document.querySelectorAll('[data-upload-type]').forEach(tab=>tab.addEventListener('click',()=>{ document.querySelectorAll('[data-upload-type]').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); currentUploadType=tab.dataset.uploadType; renderUploadForm(); }));
    document.querySelectorAll('.section-tab').forEach(tab=>{ if(tab.dataset.section) tab.addEventListener('click',()=>{ document.querySelectorAll('.profile-sections .section-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); currentProfileSection=tab.dataset.section; renderProfileSection(currentProfileSection); }); });
    document.getElementById('openEditProfileBtn')?.addEventListener('click',()=>{ document.getElementById('editName').value=profileData.name; document.getElementById('editTelegram').value=profileData.telegram||''; document.getElementById('editBio').value=profileData.bio; document.getElementById('editSocials').value=profileData.socials||''; document.getElementById('editProfileModal').classList.add('active'); });
    document.getElementById('saveProfileChangesBtn')?.addEventListener('click',()=>{ profileData.name=document.getElementById('editName').value; profileData.telegram=document.getElementById('editTelegram').value; profileData.bio=document.getElementById('editBio').value; profileData.socials=document.getElementById('editSocials').value; saveAll(); renderProfile(); document.getElementById('editProfileModal').classList.remove('active'); showToast("Профиль сохранён"); });
    document.getElementById('closeEditProfileModal')?.addEventListener('click',()=>document.getElementById('editProfileModal').classList.remove('active'));
    document.getElementById('profileAvatarLarge')?.addEventListener('click',()=>{ const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=e=>{ if(e.target.files[0]){ const r=new FileReader(); r.onload=ev=>{ profileData.avatar=ev.target.result; saveAll(); renderProfile(); showToast("Аватар обновлён"); }; r.readAsDataURL(e.target.files[0]); } }; inp.click(); });
    function switchPage(page) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(`${page}Page`).classList.add('active'); document.querySelectorAll('.nav-tab').forEach(t=>{ t.classList.remove('active'); if(t.dataset.page===page) t.classList.add('active'); }); if(page==='home'){ renderBeats(); renderFilters(); } if(page==='favorites') renderFavorites(); if(page==='profile') renderProfile(); if(page==='upload') renderUploadForm(); }
    document.querySelectorAll('.nav-tab').forEach(tab=>tab.addEventListener('click',()=>switchPage(tab.dataset.page)));
    document.getElementById('cartBtn')?.addEventListener('click',()=>{ renderCartModal(); document.getElementById('cartModal').classList.add('active'); });
    document.getElementById('closeCartModal')?.addEventListener('click',()=>document.getElementById('cartModal').classList.remove('active'));
    document.getElementById('checkoutBtn')?.addEventListener('click',()=>{ if(cart.length===0) showToast("Корзина пуста"); else { showToast(`Заказ оформлен!`); cart=[]; saveAll(); updateCartUI(); document.getElementById('cartModal').classList.remove('active'); } });
    document.querySelectorAll('.modal-overlay').forEach(overlay=>overlay.addEventListener('click',(e)=>{ if(e.target===overlay) overlay.classList.remove('active'); }));
    initAudioPlayer(); renderFilters(); renderBeats(); updateCartUI(); renderProfile(); renderUploadForm();
</script>
</body>
</html>
