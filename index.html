<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>BeatWave — премиум биты | Telegram WebApp</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --tg-bg: var(--tg-theme-bg-color, #0a0a0f);
            --tg-text: var(--tg-theme-text-color, #ffffff);
            --tg-hint: var(--tg-theme-hint-color, #8e8e9a);
            --tg-link: var(--tg-theme-link-color, #5e8eff);
            --tg-button: var(--tg-theme-button-color, #7c3aed);
            --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #1c1c24);
            --card-bg: rgba(28, 28, 36, 0.8);
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 20px rgba(0,0,0,0.2);
            --glow: 0 0 20px rgba(124, 58, 237, 0.3);
        }

        body {
            background: var(--tg-bg);
            color: var(--tg-text);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 0;
            margin: 0;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Градиентный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(245, 87, 108, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px 100px 24px;
        }

        /* Хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
            backdrop-filter: blur(10px);
            background: rgba(10, 10, 15, 0.5);
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--gradient-1);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-badge {
            background: rgba(124, 58, 237, 0.2);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #a78bfa;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }

        .cart-btn {
            background: var(--gradient-1);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .cart-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .cart-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .cart-btn i {
            font-size: 1.2rem;
            position: relative;
            z-index: 1;
        }

        .cart-btn span {
            background: rgba(255,255,255,0.3);
            border-radius: 30px;
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 4px;
            backdrop-filter: blur(4px);
            position: relative;
            z-index: 1;
        }

        /* Статистика */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-card i {
            font-size: 1.8rem;
            color: #a78bfa;
        }

        .stat-info h4 {
            font-size: 0.75rem;
            color: var(--tg-hint);
        }

        .stat-info p {
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* Фильтры с анимацией */
        .filters {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 16px;
            margin-bottom: 32px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .filter-chip {
            background: var(--tg-secondary-bg);
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--tg-hint);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        .filter-chip.active {
            background: var(--gradient-1);
            color: white;
            transform: scale(1.05);
            box-shadow: var(--glow);
        }

        .filter-chip:hover {
            transform: translateY(-2px);
        }

        /* Карточки битов - современный дизайн */
        .beats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
            margin-top: 8px;
        }

        .beat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            position: relative;
        }

        .beat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.4s;
            z-index: 0;
        }

        .beat-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(124, 58, 237, 0.3);
        }

        .beat-card:hover::before {
            opacity: 0.05;
        }

        .card-img {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            overflow: hidden;
        }

        .card-img i {
            font-size: 4rem;
            color: rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }

        .beat-card:hover .card-img i {
            transform: scale(1.1);
            color: rgba(255,255,255,0.4);
        }

        .wave-animation {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .beat-card:hover .wave-animation {
            transform: scaleX(1);
        }

        .play-badge {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 0.75rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .play-badge i {
            font-size: 0.8rem;
            margin: 0;
        }

        .card-info {
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .beat-title {
            font-weight: 800;
            font-size: 1.3rem;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .producer {
            font-size: 0.85rem;
            color: var(--tg-hint);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .producer i {
            font-size: 0.8rem;
        }

        .tags {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .genre-tag {
            background: rgba(124, 58, 237, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #a78bfa;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .price {
            font-weight: 800;
            font-size: 1.5rem;
            background: var(--gradient-2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .add-to-cart {
            background: var(--tg-button);
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            color: var(--tg-button-text);
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .add-to-cart:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
        }

        /* Модалка корзины */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .cart-modal {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            width: 90%;
            max-width: 500px;
            border-radius: 32px;
            padding: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            transform: scale(0.9);
            transition: transform 0.3s;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-overlay.active .cart-modal {
            transform: scale(1);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-weight: 800;
            font-size: 1.5rem;
        }

        .close-cart {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--tg-text);
            transition: all 0.3s;
        }

        .close-cart:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }

        .cart-items-list {
            margin-bottom: 24px;
            max-height: 55vh;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .cart-item-info h4 {
            font-size: 1rem;
            font-weight: 700;
        }

        .cart-item-info p {
            font-size: 0.8rem;
            color: var(--tg-hint);
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .remove-item {
            background: rgba(245, 87, 108, 0.2);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: #f5576c;
            cursor: pointer;
            transition: all 0.3s;
        }

        .remove-item:hover {
            background: rgba(245, 87, 108, 0.4);
            transform: scale(1.1);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 1.3rem;
            margin: 20px 0;
            padding-top: 16px;
            border-top: 2px solid rgba(255,255,255,0.1);
        }

        .checkout-btn {
            width: 100%;
            background: var(--gradient-1);
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow);
        }

        .empty-cart {
            text-align: center;
            padding: 48px;
            color: var(--tg-hint);
        }

        .empty-cart i {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        /* Тосты */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            z-index: 1100;
            pointer-events: none;
            transition: all 0.3s;
            white-space: nowrap;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Адаптив */
        @media (max-width: 768px) {
            .app-container {
                padding: 16px 16px 90px 16px;
            }
            .header {
                padding: 8px 16px;
            }
            .logo h1 {
                font-size: 1.4rem;
            }
            .beats-grid {
                gap: 20px;
            }
            .cart-modal {
                width: 95%;
                padding: 20px;
            }
            .toast-msg {
                white-space: normal;
                max-width: 90%;
                text-align: center;
                font-size: 0.8rem;
            }
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.5);
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo">
            <h1>🎵 BeatWave</h1>
            <div class="logo-badge">PREMIUM BEATS</div>
        </div>
        <button class="cart-btn" id="openCartBtn">
            <i class="fas fa-shopping-cart"></i> Корзина
            <span id="cartCount">0</span>
        </button>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <i class="fas fa-headphones"></i>
            <div class="stat-info">
                <h4>Доступно битов</h4>
                <p id="totalBeats">0</p>
            </div>
        </div>
        <div class="stat-card">
            <i class="fas fa-chart-line"></i>
            <div class="stat-info">
                <h4>Топ жанр</h4>
                <p>Trap</p>
            </div>
        </div>
    </div>

    <div class="filters" id="filtersContainer"></div>

    <div class="beats-grid" id="beatsGrid"></div>
</div>

<!-- Модалка корзины -->
<div id="cartModal" class="modal-overlay">
    <div class="cart-modal">
        <div class="cart-header">
            <span>🛒 Моя корзина</span>
            <button class="close-cart" id="closeCartBtn"><i class="fas fa-times"></i></button>
        </div>
        <div id="cartItemsContainer" class="cart-items-list"></div>
        <div id="cartFooter">
            <div class="cart-total" id="cartTotalAmount">Итого: $0</div>
            <button class="checkout-btn" id="checkoutBtn">
                <i class="fab fa-telegram"></i> Оформить заказ
            </button>
        </div>
    </div>
</div>

<div id="toastMessage" class="toast-msg" style="opacity:0; visibility: hidden;">Сообщение</div>

<script>
    // Расширенный каталог битов
    const BEATS_CATALOG = [
        { id: 1, title: "Midnight Vibe", producer: "LXRY BEATS", genre: "trap", price: 29.99, bpm: 140, key: "A Minor" },
        { id: 2, title: "Sunset Melody", producer: "SoulProd", genre: "lofi", price: 24.99, bpm: 85, key: "C Major" },
        { id: 3, title: "Rage Mode", producer: "Basskick", genre: "trap", price: 34.99, bpm: 150, key: "D# Minor" },
        { id: 4, title: "Neon Dreams", producer: "Synthic", genre: "electronic", price: 39.99, bpm: 128, key: "F Minor" },
        { id: 5, title: "Old School Joint", producer: "DustyFingers", genre: "boom-bap", price: 19.99, bpm: 92, key: "G Major" },
        { id: 6, title: "Guitar Emotions", producer: "RiosBeats", genre: "rnb", price: 27.99, bpm: 75, key: "E Minor" },
        { id: 7, title: "Heavy 808", producer: "TRVP LORD", genre: "trap", price: 44.99, bpm: 145, key: "B Minor" },
        { id: 8, title: "Cloud Rap", producer: "Yung atmos", genre: "cloud", price: 22.99, bpm: 130, key: "A# Minor" },
        { id: 9, title: "Jazz Vibes", producer: "LoFi Panda", genre: "lofi", price: 21.99, bpm: 88, key: "D Minor" },
        { id: 10, title: "Future Bass", producer: "WaveMaster", genre: "electronic", price: 32.99, bpm: 150, key: "C# Minor" }
    ];

    const genres = ["all", ...new Set(BEATS_CATALOG.map(b => b.genre))];
    let currentGenre = "all";
    let cart = [];

    let tg = window.Telegram?.WebApp;
    if (tg) {
        tg.expand();
        tg.enableClosingConfirmation();
        tg.onEvent('themeChanged', () => {
            document.documentElement.style.setProperty('--tg-bg', tg.themeParams.bg_color || '#0a0a0f');
            document.documentElement.style.setProperty('--tg-text', tg.themeParams.text_color || '#ffffff');
            document.documentElement.style.setProperty('--tg-hint', tg.themeParams.hint_color || '#8e8e9a');
            document.documentElement.style.setProperty('--tg-button', tg.themeParams.button_color || '#7c3aed');
            document.documentElement.style.setProperty('--tg-button-text', tg.themeParams.button_text_color || '#ffffff');
            document.documentElement.style.setProperty('--tg-secondary-bg', tg.themeParams.secondary_bg_color || '#1c1c24');
        });
        tg.ready();
    }

    function showToast(message, duration = 2000) {
        const toast = document.getElementById('toastMessage');
        toast.textContent = message;
        toast.style.opacity = '1';
        toast.style.visibility = 'visible';
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.visibility = 'hidden';
        }, duration);
    }

    function updateCartCounter() {
        const countSpan = document.getElementById('cartCount');
        if (countSpan) countSpan.innerText = cart.reduce((sum, item) => sum + item.quantity, 0);
        const totalBeatsSpan = document.getElementById('totalBeats');
        if (totalBeatsSpan) totalBeatsSpan.innerText = BEATS_CATALOG.length;
    }

    function addToCart(beat) {
        const existing = cart.find(item => item.id === beat.id);
        if (existing) {
            existing.quantity += 1;
            showToast(`➕ ${beat.title} добавлен еще раз`, 1200);
        } else {
            cart.push({
                id: beat.id,
                title: beat.title,
                producer: beat.producer,
                price: beat.price,
                quantity: 1,
                genre: beat.genre
            });
            showToast(`✨ ${beat.title} добавлен в корзину!`, 1500);
        }
        updateCartCounter();
        renderCartModal();
        if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }

    function removeFromCart(itemId, removeAll = false) {
        const idx = cart.findIndex(i => i.id === itemId);
        if (idx === -1) return;
        if (removeAll || cart[idx].quantity === 1) {
            const removed = cart[idx];
            cart.splice(idx, 1);
            showToast(`🗑️ ${removed.title} удален`, 1000);
        } else {
            cart[idx].quantity -= 1;
            showToast(`➖ Количество уменьшено`, 1000);
        }
        updateCartCounter();
        renderCartModal();
    }

    function renderCartModal() {
        const container = document.getElementById('cartItemsContainer');
        const footerDiv = document.getElementById('cartFooter');
        if (!container) return;

        if (cart.length === 0) {
            container.innerHTML = `<div class="empty-cart"><i class="fas fa-shopping-cart"></i><p>Корзина пуста</p><small>Добавьте биты, чтобы продолжить</small></div>`;
            if (footerDiv) footerDiv.style.display = 'none';
            return;
        }

        if (footerDiv) footerDiv.style.display = 'block';
        let html = '';
        let total = 0;
        cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            html += `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <h4>${escapeHtml(item.title)}</h4>
                        <p>${escapeHtml(item.producer)} • $${item.price.toFixed(2)}</p>
                        <small>Кол-во: ${item.quantity}</small>
                    </div>
                    <div class="cart-item-actions">
                        <span style="font-weight:700; font-size:1.1rem;">$${itemTotal.toFixed(2)}</span>
                        <button class="remove-item" data-id="${item.id}"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        const totalSpan = document.getElementById('cartTotalAmount');
        if (totalSpan) totalSpan.innerText = `Итого: $${total.toFixed(2)}`;
        
        document.querySelectorAll('.remove-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                removeFromCart(id, true);
            });
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderBeats() {
        const grid = document.getElementById('beatsGrid');
        if (!grid) return;
        let filtered = BEATS_CATALOG;
        if (currentGenre !== 'all') {
            filtered = BEATS_CATALOG.filter(beat => beat.genre === currentGenre);
        }
        if (filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px;"><i class="fas fa-music" style="font-size:3rem; opacity:0.3;"></i><p>Нет битов в этом жанре 🎧</p></div>`;
            return;
        }
        grid.innerHTML = filtered.map(beat => `
            <div class="beat-card" data-beat='${JSON.stringify(beat)}'>
                <div class="card-img">
                    <i class="fas fa-waveform"></i>
                    <div class="play-badge">
                        <i class="fas fa-play-circle"></i> Preview
                    </div>
                    <div class="wave-animation"></div>
                </div>
                <div class="card-info">
                    <div class="beat-title">${escapeHtml(beat.title)}</div>
                    <div class="producer"><i class="fas fa-user"></i> ${escapeHtml(beat.producer)}</div>
                    <div class="tags">
                        <span class="genre-tag">${beat.genre.toUpperCase()}</span>
                        <span class="genre-tag">${beat.bpm} BPM</span>
                        <span class="genre-tag">${beat.key}</span>
                    </div>
                    <div class="price-row">
                        <div class="price">$${beat.price.toFixed(2)}</div>
                        <button class="add-to-cart" data-id="${beat.id}"><i class="fas fa-cart-plus"></i> Купить</button>
                    </div>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const beatId = parseInt(btn.getAttribute('data-id'));
                const beat = BEATS_CATALOG.find(b => b.id === beatId);
                if (beat) addToCart(beat);
            });
        });
        
        document.querySelectorAll('.beat-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('add-to-cart') || e.target.closest('.add-to-cart')) return;
                const beatRaw = card.getAttribute('data-beat');
                if (beatRaw) {
                    try {
                        const beat = JSON.parse(beatRaw);
                        showToast(`🎧 Прослушивание: ${beat.title} — качество 320kbps`, 1500);
                        if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    } catch(e) {}
                }
            });
        });
    }

    function renderFilters() {
        const container = document.getElementById('filtersContainer');
        if (!container) return;
        container.innerHTML = genres.map(genre => `
            <div class="filter-chip ${currentGenre === genre ? 'active' : ''}" data-genre="${genre}">
                ${genre === 'all' ? '🎵 Все биты' : genre.charAt(0).toUpperCase() + genre.slice(1)}
            </div>
        `).join('');
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const genre = chip.getAttribute('data-genre');
                if (genre === currentGenre) return;
                currentGenre = genre;
                renderFilters();
                renderBeats();
                if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                showToast(`📁 ${genre === 'all' ? 'Все жанры' : genre}`, 800);
            });
        });
    }

    function checkout() {
        if (!cart.length) {
            showToast("Корзина пуста! Добавьте биты", 1500);
            return;
        }
        const totalAmount = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
        const itemsList = cart.map(i => `${i.title} (x${i.quantity}) — $${(i.price * i.quantity).toFixed(2)}`).join('\n');
        
        if (tg && tg.sendData) {
            const confirmMsg = `Оформить заказ на сумму $${totalAmount.toFixed(2)}?`;
            if (confirm(confirmMsg)) {
                const orderPayload = {
                    action: 'new_order',
                    items: cart,
                    total: totalAmount,
                    userId: tg.initDataUnsafe?.user?.id || null,
                    date: new Date().toISOString()
                };
                tg.sendData(JSON.stringify(orderPayload));
                showToast("✅ Заказ отправлен! Ожидайте ссылку на оплату", 3000);
                cart = [];
                updateCartCounter();
                renderCartModal();
                if (document.getElementById('cartModal').classList.contains('active')) {
                    renderCartModal();
                }
            }
        } else {
            showToast("Демо-режим: заказ сформирован", 2000);
            console.log("Order:", { items: cart, total: totalAmount });
        }
    }

    function initCartModal() {
        const modal = document.getElementById('cartModal');
        const openBtn = document.getElementById('openCartBtn');
        const closeBtn = document.getElementById('closeCartBtn');
        if (!modal || !openBtn) return;

        openBtn.addEventListener('click', () => {
            renderCartModal();
            modal.classList.add('active');
        });
        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });
        const checkoutBtn = document.getElementById('checkoutBtn');
        if (checkoutBtn) checkoutBtn.addEventListener('click', () => {
            checkout();
            modal.classList.remove('active');
        });
    }

    function init() {
        renderFilters();
        renderBeats();
        initCartModal();
        updateCartCounter();
        setTimeout(() => {
            showToast("🎶 Добро пожаловать в BeatWave! Слушай и вдохновляйся", 2500);
        }, 500);
    }

    init();
</script>
</body>
</html>
